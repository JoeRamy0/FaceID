<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Recognition Attendance | St. Joseph Church</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 1.2rem;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 1.6rem; }
        .header p { margin: 0.3rem 0 0; font-size: 0.8rem; opacity: 0.9; }
        .mode-selector {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 1.2rem;
            background: #f8fafd;
            border-bottom: 1px solid #ddd;
        }
        .mode-btn {
            flex: 1;
            background: white;
            border: 1px solid #bdc3d0;
            padding: 0.7rem;
            border-radius: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .mode-btn.active { background: #1e3c72; color: white; border-color: #1e3c72; }
        .panel { padding: 1.2rem; display: none; }
        .panel.active-panel { display: block; }
        .video-wrapper {
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 1rem;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn-capture {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-capture:active { transform: scale(0.97);}
        .btn-capture:disabled { background: #95a5a6; cursor: not-allowed; }
        .camera-selector {
            display: flex;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .cam-btn {
            flex: 1;
            background: #e0e7ff;
            border: 1px solid #bdc3d0;
            padding: 0.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .cam-btn.active { background: #1e3c72; color: white; }
        .date-selector {
            background: #f0f4fa;
            border-radius: 2rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .date-selector label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e3c72;
        }
        .date-selector select {
            width: 100%;
            padding: 0.7rem;
            border-radius: 2rem;
            border: 1px solid #bdc3d0;
            font-size: 0.9rem;
            background: white;
        }
        .status {
            background: #eef2f7;
            border-radius: 2rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .status.error { background: #fee2e2; color: #c33; }
        .status.success { background: #d4edda; color: #155724; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; color: #1e4663; }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .result-area {
            background: #e9ecef;
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-top: 1rem;
            max-height: 250px;
            overflow-y: auto;
        }
        .attendance-item {
            background: white;
            margin: 0.3rem 0;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge { background: #2e7d32; color: white; border-radius: 20px; padding: 0.2rem 0.8rem; font-size: 0.75rem; }
        .progress-bar { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2c7da0; width: 0%; transition: width 0.3s; }
        .footer { font-size: 0.7rem; text-align: center; background: #f1f5f9; padding: 0.6rem; color: #4a627a; }
        .debug-info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.5rem;
            text-align: left;
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
        }
        .face-indicator {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 10;
        }
        .camera-info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #4caf50;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>⛪ St. Joseph Church</h1>
        <p>Face Recognition Attendance System</p>
    </div>
    <div class="mode-selector">
        <button id="takeAttendanceBtn" class="mode-btn active">📸 Take Attendance</button>
        <button id="registerFaceBtn" class="mode-btn">🆕 Register New Face</button>
    </div>

    <div id="attendancePanel" class="panel active-panel">
        <div class="video-wrapper">
            <video id="attendanceVideo" autoplay muted playsinline></video>
            <canvas id="attendanceCanvas"></canvas>
            <div id="attendanceFaceIndicator" class="face-indicator">🔍 Waiting for face...</div>
            <div id="attendanceCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="attendanceFrontCam" class="cam-btn active">🤳 Front</button>
            <button id="attendanceBackCam" class="cam-btn">📱 Back</button>
        </div>
        
        <div class="date-selector">
            <label>📅 Select Date for Attendance</label>
            <select id="attendanceDateSelect">
                <option value="">-- Select Date --</option>
            </select>
        </div>
        
        <button id="captureAttendance" class="btn-capture">🔍 Recognize & Mark Attendance</button>
        <div id="attendanceStatus" class="status">⏳ Loading AI models...</div>
        <div class="progress-bar"><div id="attendanceProgress" class="progress-fill"></div></div>
        <div id="attendanceResult" class="result-area"><div style="text-align:center;color:#6c757d;">📋 Attendance for selected date will appear here</div></div>
        <div id="attendanceDebug" class="debug-info"></div>
    </div>

    <div id="registerPanel" class="panel">
        <div class="video-wrapper">
            <video id="registerVideo" autoplay muted playsinline></video>
            <canvas id="registerCanvas"></canvas>
            <div id="registerFaceIndicator" class="face-indicator">🔍 Waiting for face...</div>
            <div id="registerCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="registerFrontCam" class="cam-btn active">🤳 Front</button>
            <button id="registerBackCam" class="cam-btn">📱 Back</button>
        </div>
        <div class="input-group">
            <label>👤 Full Name (exactly as in Sheet1)</label>
            <input type="text" id="newUserName" placeholder="Example: يوسف رامي سامي" autocomplete="off">
        </div>
        <button id="captureRegister" class="btn-capture">📸 Capture Face & Register</button>
        <div id="registerStatus" class="status">⏳ Loading AI models...</div>
        <div class="progress-bar"><div id="registerProgress" class="progress-fill"></div></div>
        <div id="registerDebug" class="debug-info"></div>
    </div>
    <div class="footer">🔗 Select date, then scan face to mark attendance | Data saved locally</div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const SHEET_ID = '1VYIPqwlbTAA8_NvXT6pUMxIcT8f6Jq2hoayGt1UMNr0';
    const SHEET_GID = '0';
    const GOOGLE_SHEETS_JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
    
    // Apps Script URL - REPLACE WITH YOUR DEPLOYED URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/YOUR_APPS_SCRIPT_URL/exec";
    
    const MODEL_URL = './models';
    
    // ==================== GLOBALS ====================
    let modelsLoaded = false;
    let attendanceVideo, attendanceCanvas, registerVideo, registerCanvas;
    let attendanceStream = null, registerStream = null;
    let membersList = [];
    let faceDescriptorsDB = [];
    let dateHeaders = [];
    let isProcessing = false;
    let currentAttendanceCamera = 'user';
    let currentRegisterCamera = 'user';
    let detectionInterval = null;
    
    // UI Elements
    const takeAttendanceBtn = document.getElementById('takeAttendanceBtn');
    const registerFaceBtn = document.getElementById('registerFaceBtn');
    const attendancePanelDiv = document.getElementById('attendancePanel');
    const registerPanelDiv = document.getElementById('registerPanel');
    const captureAttendanceBtn = document.getElementById('captureAttendance');
    const captureRegisterBtn = document.getElementById('captureRegister');
    const attendanceStatusDiv = document.getElementById('attendanceStatus');
    const registerStatusDiv = document.getElementById('registerStatus');
    const attendanceResultDiv = document.getElementById('attendanceResult');
    const attendanceDebugDiv = document.getElementById('attendanceDebug');
    const registerDebugDiv = document.getElementById('registerDebug');
    const newUserNameInput = document.getElementById('newUserName');
    const attendanceProgress = document.getElementById('attendanceProgress');
    const registerProgress = document.getElementById('registerProgress');
    const attendanceFaceIndicator = document.getElementById('attendanceFaceIndicator');
    const registerFaceIndicator = document.getElementById('registerFaceIndicator');
    const attendanceFrontCam = document.getElementById('attendanceFrontCam');
    const attendanceBackCam = document.getElementById('attendanceBackCam');
    const registerFrontCam = document.getElementById('registerFrontCam');
    const registerBackCam = document.getElementById('registerBackCam');
    const attendanceDateSelect = document.getElementById('attendanceDateSelect');
    
    function formatDate(dateValue) {
        if (!dateValue) return '';
        try {
            const d = new Date(dateValue);
            if (isNaN(d.getTime())) return '';
            return d.toISOString().split('T')[0];
        } catch(e) {
            return '';
        }
    }
    
    function updateStatus(element, message, type = 'info') {
        element.textContent = message;
        element.className = 'status ' + type;
    }
    
    function updateDebug(element, message, isError = false) {
        const timestamp = new Date().toLocaleTimeString();
        const prefix = isError ? '❌' : '✅';
        element.innerHTML = `${prefix} [${timestamp}] ${message}<br>` + element.innerHTML;
        const lines = element.innerHTML.split('<br>');
        if (lines.length > 20) element.innerHTML = lines.slice(0, 20).join('<br>');
        console.log(message);
    }
    
    function updateProgress(element, percent) {
        if (element) element.style.width = percent + '%';
    }
    
    // ==================== LOAD MEMBERS AND DATES FROM GOOGLE SHEETS ====================
    async function loadSheetData() {
        try {
            updateDebug(attendanceDebugDiv, "📥 Loading data from Google Sheets...");
            const response = await fetch(GOOGLE_SHEETS_JSON_URL);
            const text = await response.text();
            
            const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const data = JSON.parse(jsonStr);
            
            const rows = data.table.rows;
            
            // Get the first row (header row) which contains dates
            const headerRow = rows[0];
            if (!headerRow) {
                throw new Error('No header row found');
            }
            
            // Parse dates from header row (skip first column which is "الأسم")
            dateHeaders = [];
            for (let i = 1; i < headerRow.c.length; i++) {
                const cell = headerRow.c[i];
                if (cell && cell.v) {
                    let dateValue = null;
                    
                    // Check if it's a date object or string
                    if (cell.v instanceof Date) {
                        dateValue = cell.v;
                    } else if (typeof cell.v === 'string') {
                        // Try to parse date string
                        const parsed = new Date(cell.v);
                        if (!isNaN(parsed.getTime())) {
                            dateValue = parsed;
                        }
                    }
                    
                    if (dateValue && !isNaN(dateValue.getTime())) {
                        dateHeaders.push({
                            column: i + 1, // 1-indexed column for API
                            date: dateValue,
                            dateStr: formatDate(dateValue)
                        });
                    }
                }
            }
            
            // Populate date dropdown
            attendanceDateSelect.innerHTML = '<option value="">-- Select Date --</option>';
            dateHeaders.forEach(dateInfo => {
                const option = document.createElement('option');
                option.value = dateInfo.column;
                option.textContent = dateInfo.dateStr;
                attendanceDateSelect.appendChild(option);
            });
            
            updateDebug(attendanceDebugDiv, `📅 Found ${dateHeaders.length} dates`);
            if (dateHeaders.length > 0) {
                updateDebug(attendanceDebugDiv, `Dates: ${dateHeaders.map(d => d.dateStr).join(', ')}`);
            } else {
                updateDebug(attendanceDebugDiv, `⚠️ No dates found. Check your sheet header row.`, true);
            }
            
            // Load members from rows (skip header row)
            const members = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row && row.c && row.c[0] && row.c[0].v) {
                    const name = row.c[0].v.toString().trim();
                    if (name && name !== '') {
                        members.push({
                            name: name,
                            rowIndex: i + 1 // 1-indexed row for API
                        });
                    }
                }
            }
            
            membersList = members;
            updateDebug(attendanceDebugDiv, `✅ Loaded ${membersList.length} members`);
            return true;
        } catch (err) {
            updateDebug(attendanceDebugDiv, `❌ Error loading data: ${err.message}`, true);
            return false;
        }
    }
    
    // ==================== MARK ATTENDANCE VIA APPS SCRIPT ====================
    async function markAttendanceInSheet(name, rowIndex, columnIndex) {
        try {
            updateDebug(attendanceDebugDiv, `📤 Marking attendance for ${name} at row ${rowIndex}, column ${columnIndex}...`);
            
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: "markAttendance", 
                    name: name,
                    row: rowIndex,
                    column: columnIndex
                })
            });
            
            const result = await response.json();
            return result;
        } catch (err) {
            updateDebug(attendanceDebugDiv, `❌ Error: ${err.message}`, true);
            return { success: false, error: err.message };
        }
    }
    
    // ==================== FACE RECOGNITION ====================
    async function loadModels() {
        if(modelsLoaded) return true;
        
        updateStatus(attendanceStatusDiv, "📥 Loading AI models...", "info");
        updateProgress(attendanceProgress, 10);
        
        try {
            updateDebug(attendanceDebugDiv, `Loading models from: ${MODEL_URL}`);
            
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 40);
            updateDebug(attendanceDebugDiv, "✓ SSD MobileNet loaded");
            
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 70);
            updateDebug(attendanceDebugDiv, "✓ Face Landmark loaded");
            
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 100);
            updateDebug(attendanceDebugDiv, "✓ Face Recognition loaded");
            
            modelsLoaded = true;
            updateStatus(attendanceStatusDiv, "✅ Models ready!", "success");
            updateStatus(registerStatusDiv, "✅ Models ready!", "success");
            
            setTimeout(() => updateProgress(attendanceProgress, 0), 1000);
            return true;
        } catch(e) {
            updateDebug(attendanceDebugDiv, `ERROR: ${e.message}`, true);
            updateStatus(attendanceStatusDiv, `❌ Failed: ${e.message}`, "error");
            return false;
        }
    }
    
    async function detectFace(video) {
        if (!modelsLoaded || !video.videoWidth) return null;
        try {
            return await faceapi.detectSingleFace(video);
        } catch(e) {
            return null;
        }
    }
    
    async function getFaceWithDescriptor(video) {
        if (!modelsLoaded || !video.videoWidth) return null;
        
        for (let attempt = 1; attempt <= 6; attempt++) {
            try {
                const detection = await faceapi.detectSingleFace(video)
                    .withFaceLandmarks()
                    .withFaceDescriptor();
                if (detection && detection.descriptor) {
                    return detection;
                }
            } catch(e) {}
            await new Promise(r => setTimeout(r, 500));
        }
        return null;
    }
    
    async function drawDetection(video, canvas, indicator) {
        if (!modelsLoaded || !video.videoWidth) return false;
        
        try {
            const detection = await detectFace(video);
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (detection) {
                const resized = faceapi.resizeResults(detection, displaySize);
                faceapi.draw.drawDetections(canvas, [resized]);
                if (indicator) {
                    indicator.innerHTML = '✅ Face detected!';
                    indicator.style.background = 'rgba(46, 125, 50, 0.9)';
                }
                return true;
            } else {
                if (indicator) {
                    indicator.innerHTML = '🔍 No face detected';
                    indicator.style.background = 'rgba(0,0,0,0.7)';
                }
                return false;
            }
        } catch(e) {
            return false;
        }
    }
    
    function startDetectionLoop(video, canvas, indicator) {
        if (detectionInterval) clearInterval(detectionInterval);
        detectionInterval = setInterval(async () => {
            await drawDetection(video, canvas, indicator);
        }, 150);
    }
    
    // ==================== FACE DESCRIPTORS ====================
    async function loadFaceDescriptors() {
        const stored = localStorage.getItem('face_descriptors');
        if (stored) {
            try {
                const faces = JSON.parse(stored);
                faceDescriptorsDB = faces.map(f => ({ 
                    name: f.name, 
                    descriptor: new Float32Array(f.descriptor) 
                }));
                updateDebug(attendanceDebugDiv, `✅ Loaded ${faceDescriptorsDB.length} face descriptors`);
                return true;
            } catch(e) {
                updateDebug(attendanceDebugDiv, `⚠️ Error parsing stored faces`, true);
            }
        }
        updateDebug(attendanceDebugDiv, `📭 No stored face descriptors found`);
        return true;
    }
    
    async function saveFaceToLocal(name, descriptorArray) {
        try {
            const newDesc = { name, descriptor: Array.from(descriptorArray) };
            const existing = faceDescriptorsDB.map(f => ({ name: f.name, descriptor: Array.from(f.descriptor) }));
            const idx = existing.findIndex(f => f.name === name);
            if (idx !== -1) existing[idx] = newDesc;
            else existing.push(newDesc);
            
            localStorage.setItem('face_descriptors', JSON.stringify(existing));
            
            const newDescFloat = { name, descriptor: new Float32Array(descriptorArray) };
            const memIdx = faceDescriptorsDB.findIndex(f => f.name === name);
            if (memIdx !== -1) faceDescriptorsDB[memIdx] = newDescFloat;
            else faceDescriptorsDB.push(newDescFloat);
            
            updateDebug(registerDebugDiv, `✅ Face saved for ${name}`);
            return { success: true };
        } catch (err) {
            updateDebug(registerDebugDiv, `❌ Error saving face: ${err.message}`, true);
            return { success: false, error: err.message };
        }
    }
    
    function findBestMatch(descriptor, threshold = 0.6) {
        if (faceDescriptorsDB.length === 0) return null;
        
        let bestMatch = null;
        let bestDistance = Infinity;
        
        for (const person of faceDescriptorsDB) {
            const distance = faceapi.euclideanDistance(descriptor, person.descriptor);
            if (distance < bestDistance) {
                bestDistance = distance;
                bestMatch = person;
            }
        }
        
        updateDebug(attendanceDebugDiv, `Best match: ${bestMatch?.name} (distance: ${bestDistance.toFixed(4)})`);
        return bestDistance <= threshold ? bestMatch : null;
    }
    
    // ==================== CAMERA SETUP ====================
    async function startCamera(videoElement, cameraType) {
        try {
            const constraints = { 
                video: { 
                    facingMode: cameraType,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = stream;
            return new Promise((resolve) => {
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    resolve(stream);
                };
            });
        } catch(err) {
            updateDebug(attendanceDebugDiv, "Camera Error: " + err.message, true);
            return null;
        }
    }
    
    async function startAttendanceCamera() {
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if (detectionInterval) clearInterval(detectionInterval);
        
        attendanceStream = await startCamera(attendanceVideo, currentAttendanceCamera);
        if (attendanceStream) {
            const info = document.getElementById('attendanceCameraInfo');
            if (info) info.innerHTML = currentAttendanceCamera === 'user' ? '🤳 Front' : '📱 Back';
            updateDebug(attendanceDebugDiv, `Camera started`);
            startDetectionLoop(attendanceVideo, attendanceCanvas, attendanceFaceIndicator);
            return true;
        }
        return false;
    }
    
    async function startRegisterCamera() {
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
        
        registerStream = await startCamera(registerVideo, currentRegisterCamera);
        if (registerStream) {
            const info = document.getElementById('registerCameraInfo');
            if (info) info.innerHTML = currentRegisterCamera === 'user' ? '🤳 Front' : '📱 Back';
            updateDebug(registerDebugDiv, `Camera started`);
            startDetectionLoop(registerVideo, registerCanvas, registerFaceIndicator);
            return true;
        }
        return false;
    }
    
    function switchAttendanceCamera(cameraType) {
        currentAttendanceCamera = cameraType;
        attendanceFrontCam.classList.remove('active');
        attendanceBackCam.classList.remove('active');
        if (cameraType === 'user') attendanceFrontCam.classList.add('active');
        else attendanceBackCam.classList.add('active');
        startAttendanceCamera();
    }
    
    function switchRegisterCamera(cameraType) {
        currentRegisterCamera = cameraType;
        registerFrontCam.classList.remove('active');
        registerBackCam.classList.remove('active');
        if (cameraType === 'user') registerFrontCam.classList.add('active');
        else registerBackCam.classList.add('active');
        startRegisterCamera();
    }
    
    // ==================== DISPLAY ATTENDANCE ====================
    function displayAttendanceForDate(selectedDateStr) {
        const stored = localStorage.getItem('attendance_log') || '[]';
        const log = JSON.parse(stored);
        const todayAttendance = log.filter(entry => entry.date === selectedDateStr);
        
        attendanceResultDiv.innerHTML = '';
        if (todayAttendance.length === 0) {
            attendanceResultDiv.innerHTML = '<div style="text-align:center;color:#6c757d;">📋 No attendance recorded for this date</div>';
        } else {
            todayAttendance.forEach(entry => {
                attendanceResultDiv.innerHTML += `<div class="attendance-item"><span>⛪ ${entry.name}</span><span class="badge">${entry.date}</span></div>`;
            });
        }
    }
    
    // ==================== ACTIONS ====================
    async function takeAttendance() {
        console.log("=== TAKE ATTENDANCE ===");
        
        const selectedColumn = attendanceDateSelect.value;
        const selectedDateText = attendanceDateSelect.options[attendanceDateSelect.selectedIndex]?.text;
        
        if (!selectedColumn) {
            updateStatus(attendanceStatusDiv, "⚠️ Please select a date first", "warning");
            return;
        }
        
        if (isProcessing) { updateStatus(attendanceStatusDiv, "Please wait...", "warning"); return; }
        if (!modelsLoaded) { await loadModels(); if (!modelsLoaded) return; }
        if (!attendanceVideo.videoWidth) {
            await startAttendanceCamera();
            setTimeout(() => takeAttendance(), 1500);
            return;
        }
        
        isProcessing = true;
        captureAttendanceBtn.disabled = true;
        updateStatus(attendanceStatusDiv, "🔍 Detecting face...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(attendanceVideo);
            
            if (!detection || !detection.descriptor) {
                updateStatus(attendanceStatusDiv, "😞 No face detected. Try better lighting!", "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateStatus(attendanceStatusDiv, "🧠 Matching...", "info");
            const match = findBestMatch(detection.descriptor, 0.6);
            
            if (!match) {
                updateStatus(attendanceStatusDiv, "❌ Face not registered. Please register first.", "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            const person = membersList.find(m => m.name === match.name);
            if (!person) {
                updateStatus(attendanceStatusDiv, `❌ ${match.name} not found in member list`, "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateStatus(attendanceStatusDiv, `✅ Recognized: ${match.name}`, "success");
            
            const result = await markAttendanceInSheet(match.name, person.rowIndex, parseInt(selectedColumn));
            
            if (result?.success) {
                if (result.alreadyMarked) {
                    updateStatus(attendanceStatusDiv, `⚠️ ${match.name} already marked for ${selectedDateText}`, "warning");
                } else {
                    updateStatus(attendanceStatusDiv, `✅ ${match.name} marked present for ${selectedDateText}`, "success");
                    displayAttendanceForDate(selectedDateText);
                }
                updateDebug(attendanceDebugDiv, `✓ Attendance marked for ${match.name}`);
            } else {
                updateStatus(attendanceStatusDiv, `⚠️ Could not mark attendance: ${result?.error}`, "error");
            }
        } catch (error) {
            updateStatus(attendanceStatusDiv, `Error: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureAttendanceBtn.disabled = false;
        }
    }
    
    async function registerFace() {
        console.log("=== REGISTER FACE ===");
        if (isProcessing) return;
        
        const name = newUserNameInput.value.trim();
        if (!name) {
            updateStatus(registerStatusDiv, "⚠️ Please enter name", "error");
            return;
        }
        
        updateDebug(registerDebugDiv, `Starting registration for: ${name}`);
        
        if (!modelsLoaded) { await loadModels(); if (!modelsLoaded) return; }
        if (!registerVideo.videoWidth) {
            await startRegisterCamera();
            setTimeout(() => registerFace(), 1500);
            return;
        }
        
        isProcessing = true;
        captureRegisterBtn.disabled = true;
        updateStatus(registerStatusDiv, "📸 Capturing face...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(registerVideo);
            
            if (!detection || !detection.descriptor) {
                updateStatus(registerStatusDiv, "😞 No face detected. Try better lighting!", "error");
                updateDebug(registerDebugDiv, "No face detected", true);
                isProcessing = false;
                captureRegisterBtn.disabled = false;
                return;
            }
            
            updateStatus(registerStatusDiv, "💾 Saving...", "info");
            const result = await saveFaceToLocal(name, detection.descriptor);
            
            if (result?.success) {
                updateStatus(registerStatusDiv, `✅ Registered ${name}!`, "success");
                updateDebug(registerDebugDiv, `✓ Successfully registered ${name}`);
                newUserNameInput.value = '';
                updateDebug(registerDebugDiv, `Total registered: ${faceDescriptorsDB.length}`);
            } else {
                updateStatus(registerStatusDiv, `❌ Failed to save`, "error");
            }
        } catch (error) {
            updateStatus(registerStatusDiv, `Error: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureRegisterBtn.disabled = false;
        }
    }
    
    function setMode(mode) {
        if (mode === "attendance") {
            attendancePanelDiv.classList.add("active-panel");
            registerPanelDiv.classList.remove("active-panel");
            takeAttendanceBtn.classList.add("active");
            registerFaceBtn.classList.remove("active");
            if (registerStream) { registerStream.getTracks().forEach(t => t.stop()); registerStream = null; }
            startAttendanceCamera();
        } else {
            attendancePanelDiv.classList.remove("active-panel");
            registerPanelDiv.classList.add("active-panel");
            registerFaceBtn.classList.add("active");
            takeAttendanceBtn.classList.remove("active");
            if (attendanceStream) { attendanceStream.getTracks().forEach(t => t.stop()); attendanceStream = null; }
            startRegisterCamera();
        }
    }
    
    // ==================== INITIALIZATION ====================
    async function init() {
        attendanceVideo = document.getElementById('attendanceVideo');
        attendanceCanvas = document.getElementById('attendanceCanvas');
        registerVideo = document.getElementById('registerVideo');
        registerCanvas = document.getElementById('registerCanvas');
        
        function setupCanvas() {
            const wrapper = document.querySelector('.video-wrapper');
            if (wrapper) {
                const rect = wrapper.getBoundingClientRect();
                if (rect.width > 0) {
                    attendanceCanvas.width = rect.width;
                    attendanceCanvas.height = rect.height;
                    registerCanvas.width = rect.width;
                    registerCanvas.height = rect.height;
                }
            }
        }
        setTimeout(setupCanvas, 100);
        window.addEventListener('resize', setupCanvas);
        
        attendanceFrontCam.onclick = () => switchAttendanceCamera('user');
        attendanceBackCam.onclick = () => switchAttendanceCamera('environment');
        registerFrontCam.onclick = () => switchRegisterCamera('user');
        registerBackCam.onclick = () => switchRegisterCamera('environment');
        
        captureAttendanceBtn.onclick = takeAttendance;
        captureRegisterBtn.onclick = registerFace;
        takeAttendanceBtn.onclick = () => setMode("attendance");
        registerFaceBtn.onclick = () => setMode("register");
        
        attendanceDateSelect.onchange = () => {
            const selectedDateText = attendanceDateSelect.options[attendanceDateSelect.selectedIndex]?.text;
            if (selectedDateText && selectedDateText !== '-- Select Date --') {
                displayAttendanceForDate(selectedDateText);
            }
        };
        
        updateDebug(attendanceDebugDiv, "🚀 Starting application...");
        
        try {
            await tf.setBackend('webgl');
            await tf.ready();
            updateDebug(attendanceDebugDiv, `🚀 Engine: WebGL (Fast Mode)`);
        } catch (e) {
            await tf.setBackend('cpu');
            await tf.ready();
            updateDebug(attendanceDebugDiv, `⚠️ Engine: CPU (Slow Mode)`);
        }
        
        await loadSheetData();
        await loadFaceDescriptors();
        await loadModels();
        await startAttendanceCamera();
        
        updateDebug(attendanceDebugDiv, "✅ System Ready! Select a date, then look at camera");
        updateDebug(attendanceDebugDiv, "📌 Face data saved locally");
    }
    
    window.onload = init;
    window.onbeforeunload = () => {
        if (detectionInterval) clearInterval(detectionInterval);
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
    };
</script>
</body>
</html>
