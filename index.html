<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Recognition Attendance | St. Joseph Church</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 1.2rem;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 1.6rem; }
        .mode-selector {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 1.2rem;
            background: #f8fafd;
            border-bottom: 1px solid #ddd;
        }
        .mode-btn {
            flex: 1;
            background: white;
            border: 1px solid #bdc3d0;
            padding: 0.7rem;
            border-radius: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .mode-btn.active { background: #1e3c72; color: white; border-color: #1e3c72; }
        .panel { padding: 1.2rem; display: none; }
        .panel.active-panel { display: block; }
        .video-wrapper {
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 1rem;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn-capture {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-capture:active { transform: scale(0.97);}
        .btn-capture:disabled { background: #95a5a6; cursor: not-allowed; opacity: 0.6; }
        .camera-selector {
            display: flex;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .cam-btn {
            flex: 1;
            background: #e0e7ff;
            border: 1px solid #bdc3d0;
            padding: 0.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .cam-btn.active { background: #1e3c72; color: white; }
        .date-selector {
            background: #f0f4fa;
            border-radius: 2rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .date-selector label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e3c72;
        }
        .date-selector select {
            width: 100%;
            padding: 0.7rem;
            border-radius: 2rem;
            border: 1px solid #bdc3d0;
            font-size: 0.9rem;
            background: white;
        }
        .status {
            background: #eef2f7;
            border-radius: 2rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .status.error { background: #fee2e2; color: #c33; }
        .status.success { background: #d4edda; color: #155724; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; color: #1e4663; }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .result-area {
            background: #e9ecef;
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-top: 1rem;
            max-height: 250px;
            overflow-y: auto;
        }
        .attendance-item {
            background: white;
            margin: 0.3rem 0;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge { background: #2e7d32; color: white; border-radius: 20px; padding: 0.2rem 0.8rem; font-size: 0.75rem; }
        .progress-bar { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2c7da0; width: 0%; transition: width 0.3s; }
        .footer { font-size: 0.7rem; text-align: center; background: #f1f5f9; padding: 0.6rem; color: #4a627a; }
        .debug-info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.5rem;
            text-align: left;
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
        }
        .face-indicator {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 10;
        }
        .camera-info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #4caf50;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 10px;
            z-index: 10;
        }
        .retry-btn {
            background: #ffc107;
            color: #333;
            margin-top: 10px;
        }
        .retry-btn:hover { background: #e0a800; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>⛪ St. Joseph Church</h1>
        <p>Face Recognition Attendance System</p>
    </div>
    <div class="mode-selector">
        <button id="takeAttendanceBtn" class="mode-btn active">📸 Take Attendance</button>
        <button id="registerFaceBtn" class="mode-btn">🆕 Register New Face</button>
    </div>

    <div id="attendancePanel" class="panel active-panel">
        <div class="video-wrapper">
            <video id="attendanceVideo" autoplay muted playsinline></video>
            <canvas id="attendanceCanvas"></canvas>
            <div id="attendanceFaceIndicator" class="face-indicator">🔍 Waiting for face...</div>
            <div id="attendanceCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="attendanceFrontCam" class="cam-btn active">🤳 Front</button>
            <button id="attendanceBackCam" class="cam-btn">📱 Back</button>
        </div>
        
        <div class="date-selector">
            <label>📅 Select Date for Attendance</label>
            <select id="attendanceDateSelect">
                <option value="">-- Select Date --</option>
            </select>
        </div>
        
        <button id="captureAttendance" class="btn-capture">🔍 Recognize & Mark Attendance</button>
        <button id="retryDataBtn" class="btn-capture retry-btn">🔄 Retry Loading Data</button>
        <div id="attendanceStatus" class="status">⏳ Loading AI models...</div>
        <div class="progress-bar"><div id="attendanceProgress" class="progress-fill"></div></div>
        <div id="attendanceResult" class="result-area"><div style="text-align:center;color:#6c757d;">📋 Attendance for selected date will appear here</div></div>
        <div id="attendanceDebug" class="debug-info"></div>
    </div>

    <div id="registerPanel" class="panel">
        <div class="video-wrapper">
            <video id="registerVideo" autoplay muted playsinline></video>
            <canvas id="registerCanvas"></canvas>
            <div id="registerFaceIndicator" class="face-indicator">🔍 Waiting for face...</div>
            <div id="registerCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="registerFrontCam" class="cam-btn active">🤳 Front</button>
            <button id="registerBackCam" class="cam-btn">📱 Back</button>
        </div>
        <div class="input-group">
            <label>👤 Full Name (exactly as in Sheet1)</label>
            <input type="text" id="newUserName" placeholder="Example: يوسف رامي سامي" autocomplete="off">
        </div>
        <button id="captureRegister" class="btn-capture">📸 Capture Face & Register</button>
        <div id="registerStatus" class="status">⏳ Loading AI models...</div>
        <div class="progress-bar"><div id="registerProgress" class="progress-fill"></div></div>
        <div id="registerDebug" class="debug-info"></div>
    </div>
    <div class="footer">🔗 Select date, then scan face to mark attendance directly in Sheet1</div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbMd7ZvHyMVS_yUK6ANUEn4TYhLNe9o4hHz26q3Fp2a1yMhq6FlWSmgzvhBa4-MS2nug/exec";
    
    // ==================== GLOBALS ====================
    let modelsLoaded = false;
    let attendanceVideo, attendanceCanvas, registerVideo, registerCanvas;
    let attendanceStream = null, registerStream = null;
    let membersList = [];
    let faceDescriptorsDB = [];
    let dateList = [];
    let isProcessing = false;
    let currentAttendanceCamera = 'user';
    let currentRegisterCamera = 'user';
    let detectionInterval = null;
    let dataLoaded = false;
    
    // UI Elements
    const takeAttendanceBtn = document.getElementById('takeAttendanceBtn');
    const registerFaceBtn = document.getElementById('registerFaceBtn');
    const attendancePanelDiv = document.getElementById('attendancePanel');
    const registerPanelDiv = document.getElementById('registerPanel');
    const captureAttendanceBtn = document.getElementById('captureAttendance');
    const captureRegisterBtn = document.getElementById('captureRegister');
    const retryDataBtn = document.getElementById('retryDataBtn');
    const attendanceStatusDiv = document.getElementById('attendanceStatus');
    const registerStatusDiv = document.getElementById('registerStatus');
    const attendanceResultDiv = document.getElementById('attendanceResult');
    const attendanceDebugDiv = document.getElementById('attendanceDebug');
    const registerDebugDiv = document.getElementById('registerDebug');
    const newUserNameInput = document.getElementById('newUserName');
    const attendanceProgress = document.getElementById('attendanceProgress');
    const registerProgress = document.getElementById('registerProgress');
    const attendanceFaceIndicator = document.getElementById('attendanceFaceIndicator');
    const registerFaceIndicator = document.getElementById('registerFaceIndicator');
    const attendanceFrontCam = document.getElementById('attendanceFrontCam');
    const attendanceBackCam = document.getElementById('attendanceBackCam');
    const registerFrontCam = document.getElementById('registerFrontCam');
    const registerBackCam = document.getElementById('registerBackCam');
    const attendanceDateSelect = document.getElementById('attendanceDateSelect');
    
    function updateDebug(element, message, type = 'info') {
        const timestamp = new Date().toLocaleTimeString();
        let prefix = '📌';
        let style = '';
        if (type === 'error') { prefix = '❌'; style = 'color:#721c24;'; }
        else if (type === 'success') { prefix = '✅'; style = 'color:#155724;'; }
        else if (type === 'warning') { prefix = '⚠️'; style = 'color:#856404;'; }
        else { prefix = 'ℹ️'; }
        
        const newEntry = `<div style="${style} padding:2px 0;">${prefix} [${timestamp}] ${message}</div>`;
        element.innerHTML = newEntry + element.innerHTML;
        
        if (element.children.length > 50) {
            while (element.children.length > 50) element.removeChild(element.children[element.children.length - 1]);
        }
        console.log(message);
    }
    
    function updateStatus(element, message, type = 'info') {
        element.textContent = message;
        element.className = 'status ' + type;
    }
    
    function updateProgress(element, percent) {
        if (element) element.style.width = percent + '%';
    }
    
    function formatDateArabic(dateStr) {
        const date = new Date(dateStr);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }
    
    // ==================== JSONP REQUEST ====================
    let jsonpCounter = 0;
    
    function jsonpRequest(action, params = {}) {
        return new Promise((resolve, reject) => {
            const callbackName = `jsonp_callback_${++jsonpCounter}_${Date.now()}`;
            const url = new URL(APPS_SCRIPT_URL);
            url.searchParams.append('action', action);
            url.searchParams.append('callback', callbackName);
            
            for (const [key, value] of Object.entries(params)) {
                url.searchParams.append(key, value);
            }
            
            window[callbackName] = function(data) {
                delete window[callbackName];
                if (document.body.contains(script)) {
                    document.body.removeChild(script);
                }
                resolve(data);
            };
            
            const script = document.createElement('script');
            script.src = url.toString();
            script.onerror = () => {
                delete window[callbackName];
                if (document.body.contains(script)) {
                    document.body.removeChild(script);
                }
                reject(new Error(`JSONP failed for ${action}`));
            };
            
            document.body.appendChild(script);
            
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    if (document.body.contains(script)) {
                        document.body.removeChild(script);
                    }
                    reject(new Error(`Timeout for ${action}`));
                }
            }, 15000);
        });
    }
    
    // ==================== API CALLS ====================
    async function callAppsScript(action, params = {}) {
        try {
            const result = await jsonpRequest(action, params);
            return result;
        } catch (error) {
            updateDebug(attendanceDebugDiv, `${action} failed: ${error.message}`, 'error');
            return { success: false, error: error.message };
        }
    }
    
    // ==================== LOAD FACE DESCRIPTORS FROM SHEET2 ====================
    async function loadFaceDescriptors() {
        try {
            updateDebug(attendanceDebugDiv, "👤 Loading face data from Sheet2...", 'info');
            const result = await callAppsScript('getFaceData');
            
            if (result.success && result.faces) {
                faceDescriptorsDB = result.faces.map(f => ({ 
                    name: f.name, 
                    descriptor: new Float32Array(f.descriptor) 
                }));
                updateDebug(attendanceDebugDiv, `✅ Loaded ${faceDescriptorsDB.length} face descriptors from Google Sheets`, 'success');
                return true;
            } else {
                updateDebug(attendanceDebugDiv, `⚠️ No face data found in Sheet2`, 'warning');
                return true;
            }
        } catch(e) {
            updateDebug(attendanceDebugDiv, `⚠️ Error loading faces: ${e.message}`, 'error');
            return true;
        }
    }
    
    // ==================== SAVE FACE TO SHEET2 ====================
    async function saveFaceToSheet(name, descriptorArray) {
        try {
            updateDebug(registerDebugDiv, `💾 Saving face for ${name} to Google Sheets...`, 'info');
            
            // Convert Float32Array to regular array for JSON
            const descriptor = Array.from(descriptorArray);
            
            // Use POST to save face data
            const response = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    action: 'saveFace',
                    name: name,
                    descriptor: descriptor
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                updateDebug(registerDebugDiv, `✅ Face saved to Google Sheets for ${name}`, 'success');
                // Also update local cache
                faceDescriptorsDB.push({
                    name: name,
                    descriptor: new Float32Array(descriptorArray)
                });
                return { success: true };
            } else {
                throw new Error(result.error);
            }
        } catch (err) {
            updateDebug(registerDebugDiv, `❌ Error saving to Sheet2: ${err.message}`, 'error');
            return { success: false, error: err.message };
        }
    }
    
    // ==================== LOAD ATTENDANCE FOR DATE ====================
    async function loadAllAttendanceForDate(date) {
        if (!date) return [];
        
        try {
            updateDebug(attendanceDebugDiv, `📊 Loading attendance for ${date}...`, 'info');
            const result = await callAppsScript('getAttendanceForDate', { date: date });
            
            if (result.success && result.attendance) {
                updateDebug(attendanceDebugDiv, `✅ Loaded ${result.attendance.length} attendance records`, 'success');
                return result.attendance;
            } else {
                updateDebug(attendanceDebugDiv, `⚠️ No attendance data: ${result.error || 'unknown'}`, 'warning');
                return [];
            }
        } catch (error) {
            updateDebug(attendanceDebugDiv, `❌ Error loading attendance: ${error.message}`, 'error');
            return [];
        }
    }
    
    // ==================== LOAD DATES ====================
    async function loadDates() {
        try {
            updateDebug(attendanceDebugDiv, "📅 Loading dates...", 'info');
            const result = await callAppsScript('getDatesWithColumns');
            
            if (result.success && result.dates && result.dates.length > 0) {
                dateList = result.dates;
                updateDebug(attendanceDebugDiv, `✅ Found ${dateList.length} dates`, 'success');
                
                attendanceDateSelect.innerHTML = '<option value="">-- Select Date --</option>';
                dateList.forEach(dateInfo => {
                    const option = document.createElement('option');
                    option.value = dateInfo.date;
                    option.textContent = formatDateArabic(dateInfo.date);
                    attendanceDateSelect.appendChild(option);
                });
                return true;
            } else {
                updateDebug(attendanceDebugDiv, `⚠️ No dates found: ${result.error || 'empty response'}`, 'warning');
                attendanceDateSelect.innerHTML = '<option value="">-- No dates available --</option>';
                return false;
            }
        } catch (err) {
            updateDebug(attendanceDebugDiv, `❌ Error loading dates: ${err.message}`, 'error');
            attendanceDateSelect.innerHTML = '<option value="">-- Error loading dates --</option>';
            return false;
        }
    }
    
    // ==================== LOAD MEMBERS ====================
    async function loadMembers() {
        try {
            updateDebug(attendanceDebugDiv, "👥 Loading members...", 'info');
            const result = await callAppsScript('getMembers');
            
            if (result.success && result.members && result.members.length > 0) {
                membersList = result.members;
                updateDebug(attendanceDebugDiv, `✅ Loaded ${membersList.length} members`, 'success');
                return true;
            } else {
                updateDebug(attendanceDebugDiv, `⚠️ No members found: ${result.error || 'empty response'}`, 'warning');
                return false;
            }
        } catch (err) {
            updateDebug(attendanceDebugDiv, `❌ Error loading members: ${err.message}`, 'error');
            return false;
        }
    }
    
    // ==================== LOAD ALL DATA ====================
    async function loadAllData() {
        updateDebug(attendanceDebugDiv, "🔄 Loading all data...", 'info');
        captureAttendanceBtn.disabled = true;
        
        const datesLoaded = await loadDates();
        const membersLoaded = await loadMembers();
        const facesLoaded = await loadFaceDescriptors();
        
        dataLoaded = datesLoaded && membersLoaded;
        
        if (dataLoaded) {
            updateDebug(attendanceDebugDiv, "✅ All data loaded successfully!", 'success');
            updateStatus(attendanceStatusDiv, "✅ Ready! Select a date and look at camera", "success");
            captureAttendanceBtn.disabled = false;
        } else {
            updateDebug(attendanceDebugDiv, "⚠️ Some data failed to load. Click 'Retry' to try again.", 'warning');
            updateStatus(attendanceStatusDiv, "⚠️ Data loading incomplete. Click 'Retry' button.", "warning");
            captureAttendanceBtn.disabled = false;
        }
        
        updateDebug(attendanceDebugDiv, `📊 Dates: ${dateList.length}`, datesLoaded ? 'success' : 'error');
        updateDebug(attendanceDebugDiv, `👥 Members: ${membersList.length}`, membersLoaded ? 'success' : 'error');
        updateDebug(attendanceDebugDiv, `👤 Faces: ${faceDescriptorsDB.length}`, 'info');
    }
    
    // ==================== MARK ATTENDANCE ====================
    async function markAttendance(name, date) {
        try {
            updateDebug(attendanceDebugDiv, `📤 Marking ${name} on ${date}...`, 'info');
            const result = await callAppsScript('markAttendance', { name: name, date: date });
            
            if (result.success) {
                if (result.alreadyMarked) {
                    updateDebug(attendanceDebugDiv, `⚠️ ${name} already marked`, 'warning');
                    return { success: true, alreadyMarked: true };
                } else {
                    updateDebug(attendanceDebugDiv, `✅ ${name} marked present`, 'success');
                    return { success: true };
                }
            } else {
                throw new Error(result.error);
            }
        } catch (error) {
            updateDebug(attendanceDebugDiv, `❌ Error: ${error.message}`, 'error');
            return { success: false, error: error.message };
        }
    }
    
    // ==================== DISPLAY ATTENDANCE ====================
    async function displayAttendanceForDate(date) {
        if (!date) {
            attendanceResultDiv.innerHTML = '<div style="text-align:center;color:#6c757d;">📋 Select a date</div>';
            return;
        }
        
        attendanceResultDiv.innerHTML = '<div style="text-align:center;">⏳ Loading attendance... <span class="spinner"></span></div>';
        
        const attendanceData = await loadAllAttendanceForDate(date);
        
        if (attendanceData.length === 0) {
            attendanceResultDiv.innerHTML = '<div style="text-align:center;color:#6c757d;">📋 No attendance recorded for this date</div>';
        } else {
            let html = `<div style="margin-bottom:10px;"><strong>✅ Present (${attendanceData.length}/${membersList.length})</strong></div>`;
            attendanceData.forEach(member => {
                html += `<div class="attendance-item"><span>⛪ ${member.name}</span><span class="badge">Present</span></div>`;
            });
            attendanceResultDiv.innerHTML = html;
        }
    }
    
    // ==================== FACE RECOGNITION ====================
    async function loadModels() {
        if(modelsLoaded) return true;
        
        updateStatus(attendanceStatusDiv, "📥 Loading AI models...", "info");
        updateProgress(attendanceProgress, 10);
        
        try {
            await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model');
            updateProgress(attendanceProgress, 40);
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model');
            updateProgress(attendanceProgress, 70);
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model');
            updateProgress(attendanceProgress, 100);
            
            modelsLoaded = true;
            updateStatus(attendanceStatusDiv, "✅ Models ready!", "success");
            updateStatus(registerStatusDiv, "✅ Models ready!", "success");
            setTimeout(() => updateProgress(attendanceProgress, 0), 1000);
            return true;
        } catch(e) {
            updateDebug(attendanceDebugDiv, `ERROR loading models: ${e.message}`, 'error');
            updateStatus(attendanceStatusDiv, `❌ Failed: ${e.message}`, "error");
            return false;
        }
    }
    
    async function getFaceWithDescriptor(video) {
        if (!modelsLoaded || !video.videoWidth) return null;
        
        for (let attempt = 1; attempt <= 6; attempt++) {
            try {
                const detection = await faceapi.detectSingleFace(video)
                    .withFaceLandmarks()
                    .withFaceDescriptor();
                if (detection && detection.descriptor) return detection;
            } catch(e) {}
            await new Promise(r => setTimeout(r, 500));
        }
        return null;
    }
    
    function findBestMatch(descriptor, threshold = 0.6) {
        if (faceDescriptorsDB.length === 0) {
            updateDebug(attendanceDebugDiv, "No face descriptors in database", 'warning');
            return null;
        }
        
        let bestMatch = null;
        let bestDistance = Infinity;
        
        for (const person of faceDescriptorsDB) {
            const distance = faceapi.euclideanDistance(descriptor, person.descriptor);
            if (distance < bestDistance) {
                bestDistance = distance;
                bestMatch = person;
            }
        }
        
        updateDebug(attendanceDebugDiv, `Best match: ${bestMatch?.name} (distance: ${bestDistance.toFixed(4)})`, bestDistance <= threshold ? 'success' : 'warning');
        return bestDistance <= threshold ? bestMatch : null;
    }
    
    // ==================== CAMERA ====================
    async function startCamera(videoElement, cameraType) {
        try {
            const constraints = { video: { facingMode: { exact: cameraType }, width: 640, height: 480 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = stream;
            return new Promise((resolve) => {
                videoElement.onloadedmetadata = () => { videoElement.play(); resolve(stream); };
            });
        } catch(err) {
            try {
                const constraints = { video: { facingMode: cameraType, width: 640, height: 480 } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                return new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => { videoElement.play(); resolve(stream); };
                });
            } catch(err2) {
                updateDebug(attendanceDebugDiv, `Camera Error: ${err2.message}`, 'error');
                return null;
            }
        }
    }
    
    async function startAttendanceCamera() {
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        attendanceStream = await startCamera(attendanceVideo, currentAttendanceCamera);
        if (attendanceStream) {
            updateDebug(attendanceDebugDiv, `Camera started`, 'success');
            return true;
        }
        return false;
    }
    
    async function startRegisterCamera() {
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
        registerStream = await startCamera(registerVideo, currentRegisterCamera);
        if (registerStream) {
            updateDebug(registerDebugDiv, `Camera started`, 'success');
            return true;
        }
        return false;
    }
    
    // ==================== ACTIONS ====================
    async function takeAttendance() {
        const selectedDate = attendanceDateSelect.value;
        if (!selectedDate) {
            updateStatus(attendanceStatusDiv, "⚠️ Please select a date first", "warning");
            return;
        }
        
        if (isProcessing) {
            updateStatus(attendanceStatusDiv, "⏳ Please wait...", "warning");
            return;
        }
        
        if (!modelsLoaded) { 
            updateStatus(attendanceStatusDiv, "📥 Loading models...", "info");
            await loadModels(); 
            if (!modelsLoaded) {
                updateStatus(attendanceStatusDiv, "❌ Models failed to load", "error");
                return;
            }
        }
        
        if (!attendanceVideo.videoWidth) {
            await startAttendanceCamera();
            setTimeout(() => takeAttendance(), 1500);
            return;
        }
        
        isProcessing = true;
        captureAttendanceBtn.disabled = true;
        updateStatus(attendanceStatusDiv, "🔍 Detecting face...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(attendanceVideo);
            if (!detection || !detection.descriptor) {
                updateStatus(attendanceStatusDiv, "😞 No face detected. Try better lighting!", "error");
                return;
            }
            
            updateStatus(attendanceStatusDiv, "🧠 Matching...", "info");
            const match = findBestMatch(detection.descriptor, 0.6);
            
            if (!match) {
                updateStatus(attendanceStatusDiv, "❌ Face not registered. Please register first.", "error");
                return;
            }
            
            const person = membersList.find(m => m.name === match.name);
            if (!person) {
                updateStatus(attendanceStatusDiv, `❌ ${match.name} not found in member list`, "error");
                return;
            }
            
            updateStatus(attendanceStatusDiv, `✅ Recognized: ${match.name}`, "success");
            const result = await markAttendance(match.name, selectedDate);
            
            if (result.success) {
                if (result.alreadyMarked) {
                    updateStatus(attendanceStatusDiv, `⚠️ ${match.name} already marked for this date`, "warning");
                } else {
                    updateStatus(attendanceStatusDiv, `✅ ${match.name} marked present!`, "success");
                    await displayAttendanceForDate(selectedDate);
                }
            } else {
                updateStatus(attendanceStatusDiv, `❌ Failed to mark: ${result.error}`, "error");
            }
        } catch (error) {
            updateStatus(attendanceStatusDiv, `Error: ${error.message}`, "error");
            updateDebug(attendanceDebugDiv, `Error: ${error.message}`, 'error');
        } finally {
            isProcessing = false;
            captureAttendanceBtn.disabled = false;
        }
    }
    
    async function registerFace() {
        if (isProcessing) return;
        
        const name = newUserNameInput.value.trim();
        if (!name) {
            updateStatus(registerStatusDiv, "⚠️ Please enter name", "error");
            return;
        }
        
        if (!modelsLoaded) { 
            await loadModels(); 
            if (!modelsLoaded) return; 
        }
        
        if (!registerVideo.videoWidth) {
            await startRegisterCamera();
            setTimeout(() => registerFace(), 1500);
            return;
        }
        
        isProcessing = true;
        captureRegisterBtn.disabled = true;
        updateStatus(registerStatusDiv, "📸 Capturing face...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(registerVideo);
            if (!detection || !detection.descriptor) {
                updateStatus(registerStatusDiv, "😞 No face detected. Try better lighting!", "error");
                return;
            }
            
            updateStatus(registerStatusDiv, "💾 Saving to Google Sheets...", "info");
            const result = await saveFaceToSheet(name, detection.descriptor);
            
            if (result.success) {
                updateStatus(registerStatusDiv, `✅ Registered ${name}!`, "success");
                updateDebug(registerDebugDiv, `✓ Successfully registered ${name} to Sheet2`, 'success');
                newUserNameInput.value = '';
                updateDebug(registerDebugDiv, `Total faces registered: ${faceDescriptorsDB.length}`, 'info');
            } else {
                updateStatus(registerStatusDiv, `❌ Failed to save: ${result.error}`, "error");
            }
        } catch (error) {
            updateStatus(registerStatusDiv, `Error: ${error.message}`, "error");
            updateDebug(registerDebugDiv, `Error: ${error.message}`, 'error');
        } finally {
            isProcessing = false;
            captureRegisterBtn.disabled = false;
        }
    }
    
    function setMode(mode) {
        if (mode === "attendance") {
            attendancePanelDiv.classList.add("active-panel");
            registerPanelDiv.classList.remove("active-panel");
            takeAttendanceBtn.classList.add("active");
            registerFaceBtn.classList.remove("active");
            if (registerStream) { registerStream.getTracks().forEach(t => t.stop()); registerStream = null; }
            startAttendanceCamera();
        } else {
            attendancePanelDiv.classList.remove("active-panel");
            registerPanelDiv.classList.add("active-panel");
            registerFaceBtn.classList.add("active");
            takeAttendanceBtn.classList.remove("active");
            if (attendanceStream) { attendanceStream.getTracks().forEach(t => t.stop()); attendanceStream = null; }
            startRegisterCamera();
        }
    }
    
    // ==================== INIT ====================
    async function init() {
        attendanceVideo = document.getElementById('attendanceVideo');
        attendanceCanvas = document.getElementById('attendanceCanvas');
        registerVideo = document.getElementById('registerVideo');
        registerCanvas = document.getElementById('registerCanvas');
        
        function setupCanvas() {
            const wrapper = document.querySelector('.video-wrapper');
            if (wrapper) {
                const rect = wrapper.getBoundingClientRect();
                if (rect.width > 0) {
                    attendanceCanvas.width = rect.width;
                    attendanceCanvas.height = rect.height;
                    registerCanvas.width = rect.width;
                    registerCanvas.height = rect.height;
                }
            }
        }
        setTimeout(setupCanvas, 100);
        window.addEventListener('resize', setupCanvas);
        
        attendanceFrontCam.onclick = () => { currentAttendanceCamera = 'user'; startAttendanceCamera(); };
        attendanceBackCam.onclick = () => { currentAttendanceCamera = 'environment'; startAttendanceCamera(); };
        registerFrontCam.onclick = () => { currentRegisterCamera = 'user'; startRegisterCamera(); };
        registerBackCam.onclick = () => { currentRegisterCamera = 'environment'; startRegisterCamera(); };
        
        captureAttendanceBtn.onclick = takeAttendance;
        captureRegisterBtn.onclick = registerFace;
        retryDataBtn.onclick = loadAllData;
        takeAttendanceBtn.onclick = () => setMode("attendance");
        registerFaceBtn.onclick = () => setMode("register");
        
        attendanceDateSelect.onchange = async () => {
            const selectedDate = attendanceDateSelect.value;
            if (selectedDate && selectedDate !== '') {
                await displayAttendanceForDate(selectedDate);
            }
        };
        
        updateDebug(attendanceDebugDiv, "🚀 Starting application...", 'info');
        
        try {
            await tf.setBackend('webgl');
            await tf.ready();
            updateDebug(attendanceDebugDiv, `🚀 Engine: WebGL (Fast Mode)`, 'success');
        } catch (e) {
            await tf.setBackend('cpu');
            await tf.ready();
            updateDebug(attendanceDebugDiv, `⚠️ Engine: CPU (Slow Mode)`, 'warning');
        }
        
        await loadModels();
        await startAttendanceCamera();
        await loadAllData();
        
        updateDebug(attendanceDebugDiv, "✅ System Ready! Select a date, then look at camera", 'success');
        captureAttendanceBtn.disabled = false;
    }
    
    window.onload = init;
    window.onbeforeunload = () => {
        if (detectionInterval) clearInterval(detectionInterval);
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
    };
</script>
</body>
