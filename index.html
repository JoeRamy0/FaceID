<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نظام الحضور بالتعرف على الوجه | كنيسة القديس يوسف</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.15.0/dist/tf-core.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.15.0/dist/tf-converter.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 1.2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.6rem;
        }
        .mode-selector {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 1.2rem;
            background: #f8fafd;
            border-bottom: 1px solid #ddd;
        }
        .mode-btn {
            flex: 1;
            background: white;
            border: 1px solid #bdc3d0;
            padding: 0.7rem;
            border-radius: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .mode-btn.active {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }
        .panel {
            padding: 1.2rem;
            display: none;
        }
        .panel.active-panel {
            display: block;
        }
        .video-wrapper {
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 1rem;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn-capture {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-capture:active { transform: scale(0.97);}
        .btn-capture:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .camera-selector {
            display: flex;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .cam-btn {
            flex: 1;
            background: #e0e7ff;
            border: 1px solid #bdc3d0;
            padding: 0.5rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .cam-btn.active {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }
        .status {
            background: #eef2f7;
            border-radius: 2rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .status.error {
            background: #fee2e2;
            color: #c33;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #1e4663;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .result-area {
            background: #e9ecef;
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-top: 1rem;
            max-height: 250px;
            overflow-y: auto;
        }
        .attendance-item {
            background: white;
            margin: 0.3rem 0;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            background: #2e7d32;
            color: white;
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #2c7da0;
            width: 0%;
            transition: width 0.3s;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            background: #f1f5f9;
            padding: 0.6rem;
            color: #4a627a;
        }
        .debug-info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.5rem;
            text-align: left;
            word-break: break-all;
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 0.5rem;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
        }
        .face-indicator {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 10;
        }
        .camera-info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #4caf50;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>⛪ كنيسة القديس يوسف</h1>
        <p>نظام الحضور بالتعرف على الوجه</p>
    </div>
    <div class="mode-selector">
        <button id="takeAttendanceBtn" class="mode-btn active">📸 تسجيل الحضور</button>
        <button id="registerFaceBtn" class="mode-btn">🆕 تسجيل وجه جديد</button>
    </div>

    <!-- Attendance Panel -->
    <div id="attendancePanel" class="panel active-panel">
        <div class="video-wrapper">
            <video id="attendanceVideo" autoplay muted playsinline></video>
            <canvas id="attendanceCanvas"></canvas>
            <div id="attendanceFaceIndicator" class="face-indicator">🔍 انتظار الوجه...</div>
            <div id="attendanceCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="attendanceFrontCam" class="cam-btn active">🤳 أمامية</button>
            <button id="attendanceBackCam" class="cam-btn">📱 خلفية</button>
        </div>
        <button id="captureAttendance" class="btn-capture">🔍 تعرف على الوجه وسجل الحضور</button>
        <div id="attendanceStatus" class="status">⏳ جاري تحميل النماذج...</div>
        <div class="progress-bar"><div id="attendanceProgress" class="progress-fill"></div></div>
        <div id="attendanceResult" class="result-area">
            <div style="text-align:center;color:#6c757d;">📋 سيظهر سجل الحضور هنا</div>
        </div>
        <div id="attendanceDebug" class="debug-info"></div>
    </div>

    <!-- Registration Panel -->
    <div id="registerPanel" class="panel">
        <div class="video-wrapper">
            <video id="registerVideo" autoplay muted playsinline></video>
            <canvas id="registerCanvas"></canvas>
            <div id="registerFaceIndicator" class="face-indicator">🔍 انتظار الوجه...</div>
            <div id="registerCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="registerFrontCam" class="cam-btn active">🤳 أمامية</button>
            <button id="registerBackCam" class="cam-btn">📱 خلفية</button>
        </div>
        <div class="input-group">
            <label>👤 الاسم بالكامل (كما هو في شيت الأسماء)</label>
            <input type="text" id="newUserName" placeholder="مثال: يوسف رامي سامي" autocomplete="off">
        </div>
        <button id="captureRegister" class="btn-capture">📸 التقاط الوجه وتسجيله</button>
        <div id="registerStatus" class="status">⏳ جاري تحميل النماذج...</div>
        <div class="progress-bar"><div id="registerProgress" class="progress-fill"></div></div>
        <div id="registerDebug" class="debug-info"></div>
    </div>
    <div class="footer">
        🔗 متصل بـ Google Sheets | جرب الكاميرا الخلفية إذا لم تكتشف الوجه
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbMd7ZvHyMVS_yUK6ANUEn4TYhLNe9o4hHz26q3Fp2a1yMhq6FlWSmgzvhBa4-MS2nug/exec";
    const MODEL_URL = './models';
    
    // ==================== GLOBALS ====================
    let modelsLoaded = false;
    let attendanceVideo, attendanceCanvas, registerVideo, registerCanvas;
    let attendanceStream = null, registerStream = null;
    let membersList = [];
    let faceDescriptorsDB = [];
    let isProcessing = false;
    let animationFrameId = null;
    
    // Camera settings
    let currentAttendanceCamera = 'user'; // 'user' = front, 'environment' = back
    let currentRegisterCamera = 'user';
    
    // UI Elements
    const takeAttendanceBtn = document.getElementById('takeAttendanceBtn');
    const registerFaceBtn = document.getElementById('registerFaceBtn');
    const attendancePanelDiv = document.getElementById('attendancePanel');
    const registerPanelDiv = document.getElementById('registerPanel');
    const captureAttendanceBtn = document.getElementById('captureAttendance');
    const captureRegisterBtn = document.getElementById('captureRegister');
    const attendanceStatusDiv = document.getElementById('attendanceStatus');
    const registerStatusDiv = document.getElementById('registerStatus');
    const attendanceResultDiv = document.getElementById('attendanceResult');
    const attendanceDebugDiv = document.getElementById('attendanceDebug');
    const registerDebugDiv = document.getElementById('registerDebug');
    const newUserNameInput = document.getElementById('newUserName');
    const attendanceProgress = document.getElementById('attendanceProgress');
    const registerProgress = document.getElementById('registerProgress');
    const attendanceFaceIndicator = document.getElementById('attendanceFaceIndicator');
    const registerFaceIndicator = document.getElementById('registerFaceIndicator');
    
    // Camera buttons
    const attendanceFrontCam = document.getElementById('attendanceFrontCam');
    const attendanceBackCam = document.getElementById('attendanceBackCam');
    const registerFrontCam = document.getElementById('registerFrontCam');
    const registerBackCam = document.getElementById('registerBackCam');
    
    // Helper: Get local date
    function getLocalDate() {
        const d = new Date();
        d.setHours(d.getHours() + 2);
        return d.toISOString().slice(0, 10);
    }
    
    function updateStatus(element, message, type = 'info') {
        element.textContent = message;
        element.className = 'status ' + type;
    }
    
    function updateDebug(element, message, isError = false) {
        const timestamp = new Date().toLocaleTimeString('ar-EG');
        const prefix = isError ? '❌' : 'ℹ️';
        element.innerHTML = `${prefix} [${timestamp}] ${message}<br>` + element.innerHTML;
        const lines = element.innerHTML.split('<br>');
        if (lines.length > 20) element.innerHTML = lines.slice(0, 20).join('<br>');
        console.log(message);
    }
    
    function updateProgress(element, percent) {
        if (element) element.style.width = percent + '%';
    }
    
    // ==================== GOOGLE SHEETS API ====================
    async function fetchFromSheets(action, payload = {}) {
        try {
            const params = new URLSearchParams({action, ...payload});
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`, {
                method: 'GET',
                mode: 'cors'
            });
            return await response.json();
        } catch (err) {
            updateDebug(attendanceDebugDiv, `خطأ: ${err.message}`, true);
            return { success: false, error: err.message };
        }
    }
    
    async function saveFaceToSheet(name, descriptorArray) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "saveFace",
                    name: name,
                    descriptor: Array.from(descriptorArray)
                })
            });
            return await response.json();
        } catch (err) {
            updateDebug(registerDebugDiv, `خطأ: ${err.message}`, true);
            return { success: false, error: err.message };
        }
    }
    
    async function loadMembers() {
        const res = await fetchFromSheets("getMembers");
        if(res?.success && res.members) {
            membersList = res.members;
            updateDebug(attendanceDebugDiv, `✅ تم تحميل ${membersList.length} عضو`);
            return true;
        }
        return false;
    }
    
    async function loadFaceDescriptors() {
        const res = await fetchFromSheets("getFaceData");
        if(res?.success && res.faces) {
            faceDescriptorsDB = res.faces.map(f => ({
                name: f.name,
                descriptor: new Float32Array(f.descriptor)
            }));
            updateDebug(attendanceDebugDiv, `✅ تم تحميل ${faceDescriptorsDB.length} بصمة وجه`);
            return true;
        }
        return false;
    }
    
    async function markAttendanceInSheet(name) {
        return await fetchFromSheets("markAttendance", { name, date: getLocalDate() });
    }
    
    // ==================== FACE RECOGNITION ====================
    async function loadModels() {
        if(modelsLoaded) return true;
        
        updateStatus(attendanceStatusDiv, "📥 جاري تحميل النماذج...", "info");
        updateProgress(attendanceProgress, 20);
        
        try {
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 50);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 75);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 100);
            
            modelsLoaded = true;
            updateStatus(attendanceStatusDiv, "✅ النماذج جاهزة!", "success");
            updateStatus(registerStatusDiv, "✅ النماذج جاهزة!", "success");
            
            setTimeout(() => updateProgress(attendanceProgress, 0), 1000);
            return true;
        } catch(e) {
            updateStatus(attendanceStatusDiv, `❌ خطأ: ${e.message}`, "error");
            return false;
        }
    }
    
    // Continuous face detection and drawing
    async function startFaceDetection(video, canvas, indicator, cameraInfo) {
        if (!modelsLoaded) return;
        
        const detectAndDraw = async () => {
            if (!video.videoWidth || !video.videoHeight) {
                animationFrameId = requestAnimationFrame(detectAndDraw);
                return;
            }
            
            try {
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks();
                
                const displaySize = { width: video.videoWidth, height: video.videoHeight };
                faceapi.matchDimensions(canvas, displaySize);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (detection) {
                    const resizedDetection = faceapi.resizeResults(detection, displaySize);
                    faceapi.draw.drawDetections(canvas, [resizedDetection]);
                    
                    if (indicator) {
                        indicator.innerHTML = '✅ وجه مكتشف!';
                        indicator.style.background = 'rgba(46, 125, 50, 0.9)';
                    }
                } else {
                    if (indicator) {
                        indicator.innerHTML = '🔍 لم يتم اكتشاف وجه';
                        indicator.style.background = 'rgba(0,0,0,0.7)';
                    }
                }
            } catch(e) {
                // Silent fail
            }
            
            animationFrameId = requestAnimationFrame(detectAndDraw);
        };
        
        detectAndDraw();
    }
    
    async function getFaceDescriptorFromVideo(videoElement) {
        if(!videoElement.videoWidth || !videoElement.videoHeight) {
            return null;
        }
        
        // Try multiple times to get a good face
        for (let attempt = 0; attempt < 3; attempt++) {
            const detection = await faceapi.detectSingleFace(videoElement, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();
            
            if (detection) {
                return detection.descriptor;
            }
            await new Promise(r => setTimeout(r, 300));
        }
        return null;
    }
    
    function findBestMatch(descriptor, threshold = 0.6) {
        if(faceDescriptorsDB.length === 0) return null;
        
        let bestMatch = null;
        let bestDistance = Infinity;
        
        for(const person of faceDescriptorsDB) {
            const distance = faceapi.euclideanDistance(descriptor, person.descriptor);
            if(distance < bestDistance) {
                bestDistance = distance;
                bestMatch = person;
            }
        }
        
        updateDebug(attendanceDebugDiv, `أفضل تطابق: ${bestMatch?.name} (المسافة: ${bestDistance.toFixed(3)})`);
        
        return bestDistance <= threshold ? bestMatch : null;
    }
    
    // ==================== CAMERA SETUP WITH SELECTION ====================
    async function startCameraForAttendance(cameraType = currentAttendanceCamera) {
        if(attendanceStream) {
            attendanceStream.getTracks().forEach(t => t.stop());
        }
        
        try {
            const constraints = {
                video: { 
                    facingMode: { exact: cameraType },
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            };
            
            updateDebug(attendanceDebugDiv, `📷 محاولة تشغيل الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'}...`);
            
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            attendanceStream = stream;
            attendanceVideo.srcObject = stream;
            await attendanceVideo.play();
            
            const cameraInfo = document.getElementById('attendanceCameraInfo');
            if(cameraInfo) {
                cameraInfo.innerHTML = cameraType === 'user' ? '🤳 أمامية' : '📱 خلفية';
                cameraInfo.style.background = 'rgba(0,0,0,0.6)';
            }
            
            updateDebug(attendanceDebugDiv, `✅ الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'} تعمل`);
            
            // Start live detection
            startFaceDetection(attendanceVideo, attendanceCanvas, attendanceFaceIndicator, cameraInfo);
            return true;
        } catch(err) {
            updateDebug(attendanceDebugDiv, `❌ فشل تشغيل الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'}: ${err.message}`, true);
            
            // If fails, try the other camera
            const otherCamera = cameraType === 'user' ? 'environment' : 'user';
            updateDebug(attendanceDebugDiv, `🔄 محاولة الكاميرا ${otherCamera === 'user' ? 'الأمامية' : 'الخلفية'}...`);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: otherCamera }, width: 640, height: 480 }
                });
                attendanceStream = stream;
                attendanceVideo.srcObject = stream;
                await attendanceVideo.play();
                
                currentAttendanceCamera = otherCamera;
                updateDebug(attendanceDebugDiv, `✅ تم تشغيل الكاميرا ${otherCamera === 'user' ? 'الأمامية' : 'الخلفية'}`);
                startFaceDetection(attendanceVideo, attendanceCanvas, attendanceFaceIndicator, null);
                return true;
            } catch(e) {
                updateStatus(attendanceStatusDiv, "❌ لا يمكن الوصول للكاميرا", "error");
                return false;
            }
        }
    }
    
    async function startCameraForRegister(cameraType = currentRegisterCamera) {
        if(registerStream) {
            registerStream.getTracks().forEach(t => t.stop());
        }
        
        try {
            const constraints = {
                video: { 
                    facingMode: { exact: cameraType },
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            };
            
            updateDebug(registerDebugDiv, `📷 محاولة تشغيل الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'}...`);
            
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            registerStream = stream;
            registerVideo.srcObject = stream;
            await registerVideo.play();
            
            const cameraInfo = document.getElementById('registerCameraInfo');
            if(cameraInfo) {
                cameraInfo.innerHTML = cameraType === 'user' ? '🤳 أمامية' : '📱 خلفية';
                cameraInfo.style.background = 'rgba(0,0,0,0.6)';
            }
            
            updateDebug(registerDebugDiv, `✅ الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'} تعمل`);
            
            startFaceDetection(registerVideo, registerCanvas, registerFaceIndicator, cameraInfo);
            return true;
        } catch(err) {
            updateDebug(registerDebugDiv, `❌ فشل تشغيل الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'}: ${err.message}`, true);
            
            const otherCamera = cameraType === 'user' ? 'environment' : 'user';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: otherCamera }, width: 640, height: 480 }
                });
                registerStream = stream;
                registerVideo.srcObject = stream;
                await registerVideo.play();
                
                currentRegisterCamera = otherCamera;
                updateDebug(registerDebugDiv, `✅ تم تشغيل الكاميرا ${otherCamera === 'user' ? 'الأمامية' : 'الخلفية'}`);
                startFaceDetection(registerVideo, registerCanvas, registerFaceIndicator, null);
                return true;
            } catch(e) {
                updateStatus(registerStatusDiv, "❌ لا يمكن الوصول للكاميرا", "error");
                return false;
            }
        }
    }
    
    // Switch camera for attendance
    async function switchAttendanceCamera(cameraType) {
        currentAttendanceCamera = cameraType;
        
        // Update button styles
        attendanceFrontCam.classList.remove('active');
        attendanceBackCam.classList.remove('active');
        if(cameraType === 'user') {
            attendanceFrontCam.classList.add('active');
        } else {
            attendanceBackCam.classList.add('active');
        }
        
        await startCameraForAttendance(cameraType);
        updateDebug(attendanceDebugDiv, `🔄 تم التبديل إلى الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'}`);
    }
    
    async function switchRegisterCamera(cameraType) {
        currentRegisterCamera = cameraType;
        
        registerFrontCam.classList.remove('active');
        registerBackCam.classList.remove('active');
        if(cameraType === 'user') {
            registerFrontCam.classList.add('active');
        } else {
            registerBackCam.classList.add('active');
        }
        
        await startCameraForRegister(cameraType);
        updateDebug(registerDebugDiv, `🔄 تم التبديل إلى الكاميرا ${cameraType === 'user' ? 'الأمامية' : 'الخلفية'}`);
    }
    
    // ==================== ATTENDANCE ACTION ====================
    async function takeAttendance() {
        console.log("TAKE ATTENDANCE CLICKED");
        
        if(isProcessing) {
            updateStatus(attendanceStatusDiv, "⏳ انتظر...", "warning");
            return;
        }
        
        if(!modelsLoaded) {
            await loadModels();
            if(!modelsLoaded) return;
        }
        
        if(!attendanceVideo.videoWidth) {
            updateStatus(attendanceStatusDiv, "📷 جاري تشغيل الكاميرا...", "info");
            await startCameraForAttendance(currentAttendanceCamera);
            setTimeout(() => takeAttendance(), 1500);
            return;
        }
        
        isProcessing = true;
        captureAttendanceBtn.disabled = true;
        updateStatus(attendanceStatusDiv, "🔍 جاري اكتشاف الوجه... (انتظر 2-3 ثواني)", "info");
        
        try {
            await new Promise(r => setTimeout(r, 500));
            const descriptor = await getFaceDescriptorFromVideo(attendanceVideo);
            
            if(!descriptor) {
                updateStatus(attendanceStatusDiv, "😞 لم يتم اكتشاف وجه. جرب الكاميرا الخلفية أو حسّن الإضاءة", "error");
                updateDebug(attendanceDebugDiv, "❌ لم يتم اكتشاف وجه", true);
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateDebug(attendanceDebugDiv, "✅ تم اكتشاف الوجه، جاري المطابقة...");
            updateStatus(attendanceStatusDiv, "🧠 جاري مطابقة الوجه...", "info");
            
            const match = findBestMatch(descriptor, 0.6);
            
            if(!match) {
                updateStatus(attendanceStatusDiv, "❌ وجه غير مسجل. يرجى التسجيل أولاً", "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateStatus(attendanceStatusDiv, `✅ تم التعرف: ${match.name}`, "success");
            
            const result = await markAttendanceInSheet(match.name);
            const todayStr = getLocalDate();
            
            if(result?.success) {
                attendanceResultDiv.innerHTML += `
                    <div class="attendance-item">
                        <span>⛪ ${match.name}</span>
                        <span class="badge">${todayStr}</span>
                    </div>
                `;
                attendanceResultDiv.scrollTop = attendanceResultDiv.scrollHeight;
                updateDebug(attendanceDebugDiv, `✅ تم تسجيل حضور ${match.name}`);
            }
            
        } catch(error) {
            updateStatus(attendanceStatusDiv, `❌ خطأ: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureAttendanceBtn.disabled = false;
        }
    }
    
    // ==================== REGISTRATION ACTION ====================
    async function registerFace() {
        console.log("REGISTER CLICKED");
        
        if(isProcessing) return;
        
        const name = newUserNameInput.value.trim();
        if(!name) {
            updateStatus(registerStatusDiv, "⚠️ الرجاء إدخال الاسم", "error");
            return;
        }
        
        updateDebug(registerDebugDiv, `🚀 بدء تسجيل الوجه لـ: ${name}`);
        
        if(!modelsLoaded) {
            await loadModels();
            if(!modelsLoaded) return;
        }
        
        if(!registerVideo.videoWidth) {
            updateStatus(registerStatusDiv, "📷 جاري تشغيل الكاميرا...", "info");
            await startCameraForRegister(currentRegisterCamera);
            setTimeout(() => registerFace(), 1500);
            return;
        }
        
        isProcessing = true;
        captureRegisterBtn.disabled = true;
        updateStatus(registerStatusDiv, "📸 جاري التقاط الوجه... (انتظر 2-3 ثواني)", "info");
        
        try {
            await new Promise(r => setTimeout(r, 500));
            const descriptor = await getFaceDescriptorFromVideo(registerVideo);
            
            if(!descriptor) {
                updateStatus(registerStatusDiv, "😞 لم يتم اكتشاف وجه. جرب الكاميرا الخلفية", "error");
                updateDebug(registerDebugDiv, "❌ لم يتم اكتشاف وجه", true);
                isProcessing = false;
                captureRegisterBtn.disabled = false;
                return;
            }
            
            updateDebug(registerDebugDiv, "✅ تم اكتشاف الوجه، جاري الحفظ...");
            updateStatus(registerStatusDiv, "💾 جاري حفظ الوجه...", "info");
            
            const result = await saveFaceToSheet(name, descriptor);
            
            if(result?.success) {
                updateStatus(registerStatusDiv, `✅ تم تسجيل الوجه لـ ${name} بنجاح!`, "success");
                updateDebug(registerDebugDiv, `✅ تم تسجيل ${name}`);
                newUserNameInput.value = '';
                
                const newDesc = { name, descriptor: new Float32Array(descriptor) };
                const idx = faceDescriptorsDB.findIndex(f => f.name === name);
                if(idx !== -1) faceDescriptorsDB[idx] = newDesc;
                else faceDescriptorsDB.push(newDesc);
            } else {
                updateStatus(registerStatusDiv, `❌ فشل تسجيل الوجه`, "error");
            }
            
        } catch(error) {
            updateStatus(registerStatusDiv, `❌ خطأ: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureRegisterBtn.disabled = false;
        }
    }
    
    // ==================== MODE SWITCHING ====================
    async function setMode(mode) {
        if(mode === "attendance") {
            attendancePanelDiv.classList.add("active-panel");
            registerPanelDiv.classList.remove("active-panel");
            takeAttendanceBtn.classList.add("active");
            registerFaceBtn.classList.remove("active");
            
            if(registerStream) {
                registerStream.getTracks().forEach(t => t.stop());
                registerStream = null;
            }
            await startCameraForAttendance(currentAttendanceCamera);
        } else {
            attendancePanelDiv.classList.remove("active-panel");
            registerPanelDiv.classList.add("active-panel");
            registerFaceBtn.classList.add("active");
            takeAttendanceBtn.classList.remove("active");
            
            if(attendanceStream) {
                attendanceStream.getTracks().forEach(t => t.stop());
                attendanceStream = null;
            }
            await startCameraForRegister(currentRegisterCamera);
        }
    }
    
    // ==================== INITIALIZATION ====================
    async function init() {
        attendanceVideo = document.getElementById('attendanceVideo');
        attendanceCanvas = document.getElementById('attendanceCanvas');
        registerVideo = document.getElementById('registerVideo');
        registerCanvas = document.getElementById('registerCanvas');
        
        function setupCanvas() {
            const wrapper = document.querySelector('.video-wrapper');
            if(wrapper) {
                const rect = wrapper.getBoundingClientRect();
                attendanceCanvas.width = rect.width;
                attendanceCanvas.height = rect.height;
                registerCanvas.width = rect.width;
                registerCanvas.height = rect.height;
            }
        }
        setTimeout(setupCanvas, 100);
        window.addEventListener('resize', setupCanvas);
        
        // Camera button listeners
        attendanceFrontCam.addEventListener('click', () => switchAttendanceCamera('user'));
        attendanceBackCam.addEventListener('click', () => switchAttendanceCamera('environment'));
        registerFrontCam.addEventListener('click', () => switchRegisterCamera('user'));
        registerBackCam.addEventListener('click', () => switchRegisterCamera('environment'));
        
        updateDebug(attendanceDebugDiv, "🚀 جاري تشغيل التطبيق...");
        
        await loadMembers();
        await loadFaceDescriptors();
        await loadModels();
        await startCameraForAttendance('user');
        
        captureAttendanceBtn.addEventListener('click', takeAttendance);
        captureRegisterBtn.addEventListener('click', registerFace);
        takeAttendanceBtn.addEventListener('click', () => setMode("attendance"));
        registerFaceBtn.addEventListener('click', () => setMode("register"));
        
        updateDebug(attendanceDebugDiv, "✅ التطبيق جاهز! جرب الكاميرا الأمامية أو الخلفية");
    }
    
    window.addEventListener('beforeunload', () => {
        if(animationFrameId) cancelAnimationFrame(animationFrameId);
        if(attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if(registerStream) registerStream.getTracks().forEach(t => t.stop());
    });
    
    window.addEventListener('load', init);
</script>
</body>
</html>
