<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Attendance Pro | St. Joseph Church</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 16px;
        }
        
        .app-container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        
        .mode-selector {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border-color: transparent;
        }
        
        .panel {
            padding: 20px;
            display: none;
        }
        
        .panel.active-panel {
            display: block;
        }
        
        .video-wrapper {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/3;
            position: relative;
            margin-bottom: 16px;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .camera-selector {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }
        
        .cam-btn {
            flex: 1;
            padding: 10px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .cam-btn.active {
            background: #1e3c72;
            color: white;
        }
        
        .date-selector {
            background: #f8fafc;
            padding: 12px;
            border-radius: 20px;
            margin: 16px 0;
        }
        
        .date-selector select {
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            margin-top: 8px;
        }
        
        .status {
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            margin: 12px 0;
            font-size: 0.9rem;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .status.error {
            background: #fee2e2;
            color: #c33;
            border-left: 4px solid #dc3545;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        
        .result-area {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 16px;
        }
        
        .attendance-item {
            background: white;
            padding: 10px 12px;
            border-radius: 40px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .badge-present {
            background: #28a745;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .face-indicator {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 10;
        }
        
        .input-group {
            margin: 16px 0;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            margin-top: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }
        
        .stat-card {
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3c72;
        }
        
        .footer {
            text-align: center;
            padding: 12px;
            background: #f8fafc;
            font-size: 0.7rem;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>⛪ St. Joseph Church</h1>
        <p>Face Recognition Attendance</p>
    </div>
    
    <div class="mode-selector">
        <button id="takeAttendanceBtn" class="mode-btn active">📸 Take Attendance</button>
        <button id="registerFaceBtn" class="mode-btn">🆕 Register Face</button>
    </div>
    
    <!-- Attendance Panel -->
    <div id="attendancePanel" class="panel active-panel">
        <div class="video-wrapper">
            <video id="attendanceVideo" autoplay muted playsinline></video>
            <canvas id="attendanceCanvas"></canvas>
            <div id="attendanceFaceIndicator" class="face-indicator">🔍 Waiting...</div>
        </div>
        
        <div class="camera-selector">
            <button id="attendanceBackCam" class="cam-btn active">📱 Back Camera</button>
            <button id="attendanceFrontCam" class="cam-btn">🤳 Front Camera</button>
        </div>
        
        <div class="date-selector">
            <label>📅 Select Date</label>
            <select id="attendanceDateSelect">
                <option value="">-- Loading dates --</option>
            </select>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Total Members</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="presentCount">0</div>
                <div class="stat-label">Present</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="absentCount">0</div>
                <div class="stat-label">Absent</div>
            </div>
        </div>
        
        <div id="attendanceStatus" class="status info">📱 Ready - Look at camera</div>
        <div id="attendanceResult" class="result-area">
            <div style="text-align:center;">📋 Select a date to see attendance</div>
        </div>
    </div>
    
    <!-- Register Panel -->
    <div id="registerPanel" class="panel">
        <div class="video-wrapper">
            <video id="registerVideo" autoplay muted playsinline></video>
            <canvas id="registerCanvas"></canvas>
            <div id="registerFaceIndicator" class="face-indicator">🔍 Position face</div>
        </div>
        
        <div class="camera-selector">
            <button id="registerBackCam" class="cam-btn active">📱 Back Camera</button>
            <button id="registerFrontCam" class="cam-btn">🤳 Front Camera</button>
        </div>
        
        <div class="input-group">
            <label>👤 Full Name</label>
            <input type="text" id="newUserName" placeholder="Enter full name">
        </div>
        
        <button id="captureRegister" class="btn-primary">📸 Register Face</button>
        <div id="registerStatus" class="status info">Ready to register</div>
    </div>
    
    <div class="footer">Look at camera - Auto-detection will mark attendance</div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    // REPLACE THIS WITH YOUR APPS SCRIPT URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbMd7ZvHyMVS_yUK6ANUEn4TYhLNe9o4hHz26q3Fp2a1yMhq6FlWSmgzvhBa4-MS2nug/exec";
    
    // ==================== GLOBALS ====================
    let modelsLoaded = false;
    let attendanceVideo, attendanceCanvas, registerVideo, registerCanvas;
    let attendanceCtx, registerCtx;
    let attendanceStream = null, registerStream = null;
    let faceDescriptorsDB = [];
    let membersList = [];
    let dateList = [];
    let currentSelectedDate = null;
    let attendanceForDate = [];
    let lastMarkTime = 0;
    let lastRecognizedName = null;
    let isProcessing = false;
    let currentAttendanceCamera = 'environment';
    let currentRegisterCamera = 'environment';
    let detectionLoopRunning = false;
    
    // ==================== DOM ELEMENTS ====================
    const takeAttendanceBtn = document.getElementById('takeAttendanceBtn');
    const registerFaceBtn = document.getElementById('registerFaceBtn');
    const attendancePanel = document.getElementById('attendancePanel');
    const registerPanel = document.getElementById('registerPanel');
    const captureRegisterBtn = document.getElementById('captureRegister');
    const attendanceStatus = document.getElementById('attendanceStatus');
    const registerStatus = document.getElementById('registerStatus');
    const attendanceResult = document.getElementById('attendanceResult');
    const attendanceFaceIndicator = document.getElementById('attendanceFaceIndicator');
    const registerFaceIndicator = document.getElementById('registerFaceIndicator');
    const attendanceFrontCam = document.getElementById('attendanceFrontCam');
    const attendanceBackCam = document.getElementById('attendanceBackCam');
    const registerFrontCam = document.getElementById('registerFrontCam');
    const registerBackCam = document.getElementById('registerBackCam');
    const attendanceDateSelect = document.getElementById('attendanceDateSelect');
    const totalMembersSpan = document.getElementById('totalMembers');
    const presentCountSpan = document.getElementById('presentCount');
    const absentCountSpan = document.getElementById('absentCount');
    const newUserNameInput = document.getElementById('newUserName');
    
    // ==================== HELPER FUNCTIONS ====================
    function updateStatus(element, message, type) {
        element.textContent = message;
        element.className = `status ${type}`;
    }
    
    function updateFaceIndicator(element, message, isSuccess = false) {
        element.textContent = message;
        element.style.background = isSuccess ? 'rgba(40, 167, 69, 0.9)' : 'rgba(0,0,0,0.8)';
        setTimeout(() => {
            if (element.textContent === message) {
                element.style.background = 'rgba(0,0,0,0.8)';
            }
        }, 2000);
    }
    
    // ==================== API CALLS (JSONP for CORS) ====================
    let jsonpCounter = 0;
    
    function jsonpRequest(action, params = {}) {
        return new Promise((resolve, reject) => {
            const callbackName = `j_${++jsonpCounter}_${Date.now()}`;
            const url = new URL(APPS_SCRIPT_URL);
            url.searchParams.append('action', action);
            url.searchParams.append('callback', callbackName);
            
            for (const [key, value] of Object.entries(params)) {
                url.searchParams.append(key, value);
            }
            
            window[callbackName] = function(data) {
                delete window[callbackName];
                if (document.body.contains(script)) document.body.removeChild(script);
                resolve(data);
            };
            
            const script = document.createElement('script');
            script.src = url.toString();
            script.onerror = () => {
                delete window[callbackName];
                if (document.body.contains(script)) document.body.removeChild(script);
                reject(new Error('Network error'));
            };
            
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    reject(new Error('Timeout'));
                }
            }, 10000);
        });
    }
    
    // ==================== LOAD DATA FROM APPS SCRIPT ====================
    async function loadAllData() {
        updateStatus(attendanceStatus, "📥 Loading data...", "info");
        
        try {
            const [datesRes, membersRes, facesRes] = await Promise.all([
                jsonpRequest('getDatesWithColumns'),
                jsonpRequest('getMembers'),
                jsonpRequest('getFaceData')
            ]);
            
            if (datesRes.success && datesRes.dates) {
                dateList = datesRes.dates;
                populateDateSelect();
            }
            
            if (membersRes.success && membersRes.members) {
                membersList = membersRes.members;
                totalMembersSpan.textContent = membersList.length;
            }
            
            if (facesRes.success && facesRes.faces) {
                faceDescriptorsDB = facesRes.faces.map(f => ({
                    name: f.name,
                    descriptor: new Float32Array(f.descriptor)
                }));
                console.log(`Loaded ${faceDescriptorsDB.length} registered faces`);
            }
            
            updateStatus(attendanceStatus, `✅ Ready! ${membersList.length} members, ${faceDescriptorsDB.length} faces`, "success");
            return true;
        } catch (error) {
            console.error('Load error:', error);
            updateStatus(attendanceStatus, "❌ Failed to load data", "error");
            return false;
        }
    }
    
    function populateDateSelect() {
        attendanceDateSelect.innerHTML = '<option value="">-- Select Date --</option>';
        const today = new Date().toISOString().split('T')[0];
        
        dateList.forEach(dateInfo => {
            const option = document.createElement('option');
            option.value = dateInfo.date;
            const displayDate = new Date(dateInfo.date).toLocaleDateString();
            option.textContent = `📅 ${displayDate}`;
            attendanceDateSelect.appendChild(option);
        });
        
        // Auto-select today if available
        if (dateList.some(d => d.date === today)) {
            attendanceDateSelect.value = today;
            currentSelectedDate = today;
            loadAttendanceForDate(today);
        }
    }
    
    async function loadAttendanceForDate(date) {
        if (!date) return;
        
        attendanceResult.innerHTML = '<div style="text-align:center;">⏳ Loading...</div>';
        
        const result = await jsonpRequest('getAttendanceForDate', { date });
        
        if (result.success && result.attendance) {
            attendanceForDate = result.attendance;
            const presentNames = result.attendance.map(a => a.name);
            const presentCount = presentNames.length;
            const absentCount = membersList.length - presentCount;
            
            presentCountSpan.textContent = presentCount;
            absentCountSpan.textContent = absentCount;
            
            if (presentNames.length === 0) {
                attendanceResult.innerHTML = '<div style="text-align:center;">📋 No attendance recorded</div>';
            } else {
                let html = `<div style="margin-bottom: 12px;"><strong>✅ Present (${presentCount}/${membersList.length})</strong></div>`;
                presentNames.forEach(name => {
                    html += `<div class="attendance-item"><span>⛪ ${escapeHtml(name)}</span><span class="badge-present">Present</span></div>`;
                });
                attendanceResult.innerHTML = html;
            }
        } else {
            attendanceResult.innerHTML = '<div style="text-align:center;">📋 No attendance data</div>';
        }
    }
    
    async function markAttendance(name, date) {
        try {
            const result = await jsonpRequest('markAttendance', { name, date });
            if (result.success) {
                if (result.alreadyMarked) {
                    return { success: true, alreadyMarked: true };
                }
                return { success: true };
            }
            return { success: false };
        } catch (error) {
            console.error('Mark error:', error);
            return { success: false };
        }
    }
    
    // ==================== FACE RECOGNITION ====================
    function findBestMatch(descriptor, threshold = 0.55) {
        if (faceDescriptorsDB.length === 0) return null;
        
        let bestMatch = null;
        let bestDistance = Infinity;
        
        for (const person of faceDescriptorsDB) {
            const distance = faceapi.euclideanDistance(descriptor, person.descriptor);
            if (distance < bestDistance) {
                bestDistance = distance;
                bestMatch = person;
            }
        }
        
        return bestDistance <= threshold ? bestMatch : null;
    }
    
    async function detectAndRecognize(video, canvas, ctx, indicator, isAttendance = true) {
        if (!modelsLoaded || !video.videoWidth) return null;
        
        try {
            const detection = await faceapi.detectSingleFace(
                video,
                new faceapi.TinyFaceDetectorOptions({
                    inputSize: 224,
                    scoreThreshold: 0.5
                })
            ).withFaceLandmarks().withFaceDescriptor();
            
            // Draw bounding box
            if (detection) {
                const displaySize = { width: video.videoWidth, height: video.videoHeight };
                faceapi.matchDimensions(canvas, displaySize);
                const resized = faceapi.resizeResults(detection, displaySize);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(resized.box.x, resized.box.y, resized.box.width, resized.box.height);
                
                if (indicator) {
                    updateFaceIndicator(indicator, '✅ Face detected', true);
                }
                
                // Recognize face
                if (detection.descriptor) {
                    const match = findBestMatch(detection.descriptor);
                    tf.dispose(detection.descriptor);
                    
                    if (match) {
                        if (isAttendance && currentSelectedDate && match.name !== lastRecognizedName) {
                            const now = Date.now();
                            if (now - lastMarkTime > 4000) {
                                lastMarkTime = now;
                                lastRecognizedName = match.name;
                                
                                updateStatus(attendanceStatus, `✅ Recognized: ${match.name}`, "success");
                                updateFaceIndicator(indicator, `🎯 ${match.name}`, true);
                                
                                const result = await markAttendance(match.name, currentSelectedDate);
                                if (result.success && !result.alreadyMarked) {
                                    await loadAttendanceForDate(currentSelectedDate);
                                }
                            }
                        }
                        return match;
                    } else {
                        if (indicator && !isAttendance) {
                            updateFaceIndicator(indicator, '❓ Face not registered', false);
                        }
                    }
                }
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (indicator && !isAttendance) {
                    updateFaceIndicator(indicator, '🔍 No face', false);
                }
            }
        } catch (err) {
            console.error('Detection error:', err);
        }
        return null;
    }
    
    // ==================== DETECTION LOOP ====================
    async function startDetectionLoop() {
        if (detectionLoopRunning) return;
        detectionLoopRunning = true;
        
        while (detectionLoopRunning && attendanceVideo && attendanceVideo.videoWidth) {
            await detectAndRecognize(attendanceVideo, attendanceCanvas, attendanceCtx, attendanceFaceIndicator, true);
            await new Promise(resolve => setTimeout(resolve, 500)); // Check every 500ms
        }
    }
    
    // ==================== CAMERA SETUP ====================
    async function startCamera(videoElement, cameraType, canvas, ctx) {
        try {
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(t => t.stop());
            }
            
            const constraints = {
                video: {
                    facingMode: { exact: cameraType },
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };
            
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = stream;
            
            return new Promise((resolve) => {
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    resolve(stream);
                };
            });
        } catch (err) {
            // Fallback without exact
            const constraints = { video: { facingMode: cameraType, width: 640, height: 480 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = stream;
            return new Promise((resolve) => {
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    resolve(stream);
                };
            });
        }
    }
    
    async function startAttendanceCamera() {
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        attendanceStream = await startCamera(attendanceVideo, currentAttendanceCamera, attendanceCanvas, attendanceCtx);
        return !!attendanceStream;
    }
    
    async function startRegisterCamera() {
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
        registerStream = await startCamera(registerVideo, currentRegisterCamera, registerCanvas, registerCtx);
        return !!registerStream;
    }
    
    // ==================== REGISTER FACE ====================
    async function registerFace() {
        const name = newUserNameInput.value.trim();
        if (!name) {
            updateStatus(registerStatus, "⚠️ Please enter your name", "error");
            return;
        }
        
        if (!modelsLoaded) {
            updateStatus(registerStatus, "📥 Loading models...", "info");
            await loadModels();
        }
        
        if (!registerVideo.videoWidth) {
            await startRegisterCamera();
            await new Promise(r => setTimeout(r, 1000));
        }
        
        updateStatus(registerStatus, "📸 Capturing face...", "info");
        
        try {
            const detection = await faceapi.detectSingleFace(
                registerVideo,
                new faceapi.TinyFaceDetectorOptions({ inputSize: 224 })
            ).withFaceLandmarks().withFaceDescriptor();
            
            if (!detection || !detection.descriptor) {
                updateStatus(registerStatus, "😞 No face detected. Try better lighting", "error");
                return;
            }
            
            const descriptorArray = Array.from(detection.descriptor);
            const result = await jsonpRequest('saveFace', { name, descriptor: JSON.stringify(descriptorArray) });
            
            if (result.success) {
                updateStatus(registerStatus, `✅ Registered ${name}!`, "success");
                updateFaceIndicator(registerFaceIndicator, `✅ Registered!`, true);
                faceDescriptorsDB.push({ name, descriptor: new Float32Array(descriptorArray) });
                newUserNameInput.value = '';
            } else {
                updateStatus(registerStatus, `❌ Failed: ${result.error}`, "error");
            }
        } catch (error) {
            updateStatus(registerStatus, `Error: ${error.message}`, "error");
        }
    }
    
    // ==================== LOAD MODELS ====================
    async function loadModels() {
        updateStatus(attendanceStatus, "📥 Loading AI models...", "info");
        
        try {
            await tf.setBackend('webgl');
            await tf.ready();
            
            const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
            
            await faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl);
            await faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl);
            await faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl);
            
            modelsLoaded = true;
            updateStatus(attendanceStatus, "✅ Models ready!", "success");
            updateStatus(registerStatus, "✅ Models ready!", "success");
            return true;
        } catch (error) {
            console.error('Model load error:', error);
            updateStatus(attendanceStatus, "❌ Failed to load models", "error");
            return false;
        }
    }
    
    // ==================== MODE SWITCHING ====================
    function setMode(mode) {
        if (mode === 'attendance') {
            attendancePanel.classList.add('active-panel');
            registerPanel.classList.remove('active-panel');
            takeAttendanceBtn.classList.add('active');
            registerFaceBtn.classList.remove('active');
            if (registerStream) { registerStream.getTracks().forEach(t => t.stop()); registerStream = null; }
            startAttendanceCamera();
            if (!detectionLoopRunning) startDetectionLoop();
        } else {
            attendancePanel.classList.remove('active-panel');
            registerPanel.classList.add('active-panel');
            registerFaceBtn.classList.add('active');
            takeAttendanceBtn.classList.remove('active');
            if (attendanceStream) { attendanceStream.getTracks().forEach(t => t.stop()); detectionLoopRunning = false; }
            startRegisterCamera();
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // ==================== INITIALIZATION ====================
    async function init() {
        attendanceVideo = document.getElementById('attendanceVideo');
        attendanceCanvas = document.getElementById('attendanceCanvas');
        attendanceCtx = attendanceCanvas.getContext('2d');
        registerVideo = document.getElementById('registerVideo');
        registerCanvas = document.getElementById('registerCanvas');
        registerCtx = registerCanvas.getContext('2d');
        
        // Set canvas dimensions
        function setCanvasSize() {
            const wrapper = document.querySelector('.video-wrapper');
            if (wrapper) {
                const rect = wrapper.getBoundingClientRect();
                attendanceCanvas.width = rect.width;
                attendanceCanvas.height = rect.height;
                registerCanvas.width = rect.width;
                registerCanvas.height = rect.height;
            }
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);
        
        // Camera buttons
        attendanceFrontCam.onclick = () => { currentAttendanceCamera = 'user'; startAttendanceCamera(); };
        attendanceBackCam.onclick = () => { currentAttendanceCamera = 'environment'; startAttendanceCamera(); };
        registerFrontCam.onclick = () => { currentRegisterCamera = 'user'; startRegisterCamera(); };
        registerBackCam.onclick = () => { currentRegisterCamera = 'environment'; startRegisterCamera(); };
        
        // Buttons
        captureRegisterBtn.onclick = registerFace;
        takeAttendanceBtn.onclick = () => setMode('attendance');
        registerFaceBtn.onclick = () => setMode('register');
        
        attendanceDateSelect.onchange = async () => {
            currentSelectedDate = attendanceDateSelect.value;
            if (currentSelectedDate) await loadAttendanceForDate(currentSelectedDate);
        };
        
        // Start everything
        await loadModels();
        await loadAllData();
        await startAttendanceCamera();
        startDetectionLoop();
        
        updateStatus(attendanceStatus, "📱 Ready! Look at camera", "success");
    }
    
    window.onload = init;
    window.onbeforeunload = () => {
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
        detectionLoopRunning = false;
    };
</script>
</body>
</html>
