<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Recognition Attendance | St. Joseph Church</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .header h1 { margin: 0; font-size: 1.4rem; }
        .header p { margin: 5px 0 0; font-size: 0.7rem; opacity: 0.9; }
        .mode-selector {
            display: flex;
            gap: 0.5rem;
            padding: 0.8rem 1rem;
            background: #f8fafd;
            border-bottom: 1px solid #ddd;
        }
        .mode-btn {
            flex: 1;
            background: white;
            border: 1px solid #bdc3d0;
            padding: 0.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .mode-btn.active { background: #1e3c72; color: white; }
        .panel { padding: 1rem; display: none; }
        .panel.active-panel { display: block; }
        .video-wrapper {
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 0.8rem;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .btn-capture {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 0.7rem;
            width: 100%;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.1s;
        }
        .btn-capture:active { transform: scale(0.98); }
        .btn-capture:disabled { background: #95a5a6; opacity: 0.6; cursor: not-allowed; }
        .camera-selector {
            display: flex;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .cam-btn {
            flex: 1;
            background: #e0e7ff;
            border: 1px solid #bdc3d0;
            padding: 0.4rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cam-btn.active { background: #1e3c72; color: white; }
        .date-selector {
            background: #f0f4fa;
            border-radius: 1.5rem;
            padding: 0.6rem;
            margin-bottom: 0.8rem;
        }
        .date-selector label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.8rem;
            color: #1e3c72;
        }
        .date-selector select {
            width: 100%;
            padding: 0.5rem;
            border-radius: 2rem;
            border: 1px solid #bdc3d0;
            font-size: 0.85rem;
            background: white;
        }
        .status {
            background: #eef2f7;
            border-radius: 1.5rem;
            padding: 0.6rem;
            margin-top: 0.8rem;
            font-size: 0.75rem;
            text-align: center;
        }
        .status.error { background: #fee2e2; color: #c33; }
        .status.success { background: #d4edda; color: #155724; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .input-group { margin-bottom: 0.8rem; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.8rem; }
        .input-group input {
            width: 100%;
            padding: 0.6rem;
            border-radius: 2rem;
            border: 1px solid #ccc;
            font-size: 0.9rem;
        }
        .result-area {
            background: #e9ecef;
            border-radius: 1rem;
            padding: 0.6rem;
            margin-top: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .attendance-item {
            background: white;
            margin: 0.2rem 0;
            padding: 0.4rem 0.6rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }
        .badge { background: #2e7d32; color: white; border-radius: 20px; padding: 0.1rem 0.6rem; font-size: 0.7rem; }
        .progress-bar { width: 100%; height: 3px; background: #e0e0e0; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2c7da0; width: 0%; transition: width 0.3s; }
        .footer { font-size: 0.6rem; text-align: center; background: #f1f5f9; padding: 0.4rem; }
        .debug-info {
            font-size: 0.6rem;
            margin-top: 0.5rem;
            background: #f8f9fa;
            padding: 0.4rem;
            border-radius: 0.5rem;
            max-height: 80px;
            overflow-y: auto;
            font-family: monospace;
        }
        .face-indicator {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 9px;
            z-index: 10;
        }
        .camera-info {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: #4caf50;
            padding: 2px 5px;
            border-radius: 10px;
            font-size: 8px;
            z-index: 10;
        }
        .retry-btn { background: #ffc107; color: #333; margin-top: 8px; }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 5px;
        }
        .skeleton {
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 1rem;
            height: 40px;
            margin: 5px 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>⛪ St. Joseph Church</h1>
        <p>Fast Face Recognition Attendance</p>
    </div>
    <div class="mode-selector">
        <button id="takeAttendanceBtn" class="mode-btn active">📸 Take Attendance</button>
        <button id="registerFaceBtn" class="mode-btn">🆕 Register Face</button>
    </div>

    <div id="attendancePanel" class="panel active-panel">
        <div class="video-wrapper">
            <video id="attendanceVideo" autoplay muted playsinline></video>
            <canvas id="attendanceCanvas"></canvas>
            <div id="attendanceFaceIndicator" class="face-indicator">🔍 Wait...</div>
            <div id="attendanceCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="attendanceFrontCam" class="cam-btn active">🤳 Front</button>
            <button id="attendanceBackCam" class="cam-btn">📱 Back</button>
        </div>
        
        <div class="date-selector">
            <label>📅 Select Date</label>
            <select id="attendanceDateSelect">
                <option value="">-- Loading --</option>
            </select>
        </div>
        
        <button id="captureAttendance" class="btn-capture">🔍 Mark Attendance</button>
        <button id="retryDataBtn" class="btn-capture retry-btn">🔄 Sync Data</button>
        <div id="attendanceStatus" class="status">⏳ Loading...</div>
        <div class="progress-bar"><div id="attendanceProgress" class="progress-fill"></div></div>
        <div id="attendanceResult" class="result-area"><div style="text-align:center;">📋 Attendance will appear here</div></div>
        <div id="attendanceDebug" class="debug-info"></div>
    </div>

    <div id="registerPanel" class="panel">
        <div class="video-wrapper">
            <video id="registerVideo" autoplay muted playsinline></video>
            <canvas id="registerCanvas"></canvas>
            <div id="registerFaceIndicator" class="face-indicator">🔍 Wait...</div>
            <div id="registerCameraInfo" class="camera-info">📷</div>
        </div>
        <div class="camera-selector">
            <button id="registerFrontCam" class="cam-btn active">🤳 Front</button>
            <button id="registerBackCam" class="cam-btn">📱 Back</button>
        </div>
        <div class="input-group">
            <label>👤 Full Name</label>
            <input type="text" id="newUserName" placeholder="يوسف رامي سامي" autocomplete="off">
        </div>
        <button id="captureRegister" class="btn-capture">📸 Register Face</button>
        <div id="registerStatus" class="status">⏳ Loading...</div>
        <div class="progress-bar"><div id="registerProgress" class="progress-fill"></div></div>
        <div id="registerDebug" class="debug-info"></div>
    </div>
    <div class="footer">Select date → Look at camera → Auto-mark attendance</div>
</div>

<script>
    // ==================== OPTIMIZED CONFIGURATION ====================
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbMd7ZvHyMVS_yUK6ANUEn4TYhLNe9o4hHz26q3Fp2a1yMhq6FlWSmgzvhBa4-MS2nug/exec";
    const CACHE_VERSION = 'face_rec_v1';
    const DETECTION_INTERVAL_MS = 300; // Throttled detection (300ms)
    const MARK_COOLDOWN_MS = 3000; // 3 seconds cooldown
    
    // ==================== GLOBALS ====================
    let modelsLoaded = false;
    let attendanceVideo, attendanceCanvas, registerVideo, registerCanvas;
    let attendanceCtx, registerCtx;
    let attendanceStream = null, registerStream = null;
    let membersList = [];
    let faceDescriptorsDB = [];
    let dateList = [];
    let isProcessing = false;
    let currentAttendanceCamera = 'user';
    let currentRegisterCamera = 'user';
    let detectionInterval = null;
    let lastMarkTime = 0;
    let lastRecognizedName = null;
    let dataVersion = null;
    let syncQueue = []; // Batch attendance queue
    
    // UI Elements
    const takeAttendanceBtn = document.getElementById('takeAttendanceBtn');
    const registerFaceBtn = document.getElementById('registerFaceBtn');
    const attendancePanelDiv = document.getElementById('attendancePanel');
    const registerPanelDiv = document.getElementById('registerPanel');
    const captureAttendanceBtn = document.getElementById('captureAttendance');
    const captureRegisterBtn = document.getElementById('captureRegister');
    const retryDataBtn = document.getElementById('retryDataBtn');
    const attendanceStatusDiv = document.getElementById('attendanceStatus');
    const registerStatusDiv = document.getElementById('registerStatus');
    const attendanceResultDiv = document.getElementById('attendanceResult');
    const attendanceDebugDiv = document.getElementById('attendanceDebug');
    const registerDebugDiv = document.getElementById('registerDebug');
    const newUserNameInput = document.getElementById('newUserName');
    const attendanceProgress = document.getElementById('attendanceProgress');
    const registerProgress = document.getElementById('registerProgress');
    const attendanceFaceIndicator = document.getElementById('attendanceFaceIndicator');
    const registerFaceIndicator = document.getElementById('registerFaceIndicator');
    const attendanceFrontCam = document.getElementById('attendanceFrontCam');
    const attendanceBackCam = document.getElementById('attendanceBackCam');
    const registerFrontCam = document.getElementById('registerFrontCam');
    const registerBackCam = document.getElementById('registerBackCam');
    const attendanceDateSelect = document.getElementById('attendanceDateSelect');
    
    function updateDebug(element, message, type = 'info') {
        const timestamp = new Date().toLocaleTimeString().slice(0,5);
        let prefix = '📌';
        let style = '';
        if (type === 'error') { prefix = '❌'; style = 'color:#c33;'; }
        else if (type === 'success') { prefix = '✅'; style = 'color:#155724;'; }
        else if (type === 'warning') { prefix = '⚠️'; style = 'color:#856404;'; }
        else { prefix = 'ℹ️'; }
        
        const newEntry = `<div style="${style}">${prefix} [${timestamp}] ${message}</div>`;
        element.innerHTML = newEntry + element.innerHTML;
        if (element.children.length > 15) element.removeChild(element.children[element.children.length - 1]);
    }
    
    function updateStatus(element, message, type = 'info') {
        element.textContent = message;
        element.className = 'status ' + type;
    }
    
    function updateProgress(element, percent) {
        if (element) element.style.width = percent + '%';
    }
    
    function formatDateArabic(dateStr) {
        const date = new Date(dateStr);
        return `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
    }
    
    // ==================== SERVICE WORKER FOR MODEL CACHING ====================
    async function registerServiceWorker() {
        if ('serviceWorker' in navigator) {
            try {
                const registration = await navigator.serviceWorker.register('/sw.js');
                updateDebug(attendanceDebugDiv, 'Service Worker registered', 'success');
                return true;
            } catch (error) {
                updateDebug(attendanceDebugDiv, 'Service Worker failed', 'warning');
                return false;
            }
        }
        return false;
    }
    
    // ==================== MODEL LOADING WITH CACHE ====================
    async function loadModels() {
        if(modelsLoaded) return true;
        
        updateStatus(attendanceStatusDiv, "📥 Loading models...", "info");
        updateProgress(attendanceProgress, 10);
        
        try {
            // Use Tiny Face Detector (faster, smaller)
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model');
            updateProgress(attendanceProgress, 50);
            
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model');
            updateProgress(attendanceProgress, 75);
            
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model');
            updateProgress(attendanceProgress, 100);
            
            modelsLoaded = true;
            updateStatus(attendanceStatusDiv, "✅ Models ready!", "success");
            updateStatus(registerStatusDiv, "✅ Models ready!", "success");
            setTimeout(() => updateProgress(attendanceProgress, 0), 1000);
            return true;
        } catch(e) {
            updateDebug(attendanceDebugDiv, `Model error: ${e.message}`, 'error');
            return false;
        }
    }
    
    // ==================== JSONP REQUEST ====================
    let jsonpCounter = 0;
    
    function jsonpRequest(action, params = {}) {
        return new Promise((resolve, reject) => {
            const callbackName = `j_${++jsonpCounter}_${Date.now()}`;
            const url = new URL(APPS_SCRIPT_URL);
            url.searchParams.append('action', action);
            url.searchParams.append('callback', callbackName);
            
            for (const [key, value] of Object.entries(params)) {
                url.searchParams.append(key, value);
            }
            
            window[callbackName] = function(data) {
                delete window[callbackName];
                if (document.body.contains(script)) document.body.removeChild(script);
                resolve(data);
            };
            
            const script = document.createElement('script');
            script.src = url.toString();
            script.onerror = () => {
                delete window[callbackName];
                if (document.body.contains(script)) document.body.removeChild(script);
                reject(new Error('Failed'));
            };
            
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    if (document.body.contains(script)) document.body.removeChild(script);
                    reject(new Error('Timeout'));
                }
            }, 8000);
        });
    }
    
    async function callAppsScript(action, params = {}) {
        try {
            return await jsonpRequest(action, params);
        } catch (error) {
            return { success: false, error: error.message };
        }
    }
    
    // ==================== LOCAL STORAGE FOR FACE DATA ====================
    function saveFaceDataToLocal() {
        try {
            const data = {
                version: dataVersion,
                faces: faceDescriptorsDB.map(f => ({ name: f.name, descriptor: Array.from(f.descriptor) })),
                members: membersList,
                dates: dateList,
                timestamp: Date.now()
            };
            localStorage.setItem(CACHE_VERSION, JSON.stringify(data));
            updateDebug(attendanceDebugDiv, 'Face data cached locally', 'success');
        } catch(e) {}
    }
    
    function loadFaceDataFromLocal() {
        try {
            const cached = localStorage.getItem(CACHE_VERSION);
            if (cached) {
                const data = JSON.parse(cached);
                if (data.faces && data.members) {
                    faceDescriptorsDB = data.faces.map(f => ({ name: f.name, descriptor: new Float32Array(f.descriptor) }));
                    membersList = data.members;
                    dateList = data.dates || [];
                    updateDebug(attendanceDebugDiv, `Loaded ${faceDescriptorsDB.length} faces from cache`, 'success');
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }
    
    // ==================== DIFFERENTIAL DATA LOADING ====================
    async function loadAllData(force = false) {
        if (!force && loadFaceDataFromLocal()) {
            updateDebug(attendanceDebugDiv, `Using cached data (${membersList.length} members, ${faceDescriptorsDB.length} faces)`, 'success');
            populateDateSelect();
            return true;
        }
        
        updateDebug(attendanceDebugDiv, "🔄 Fetching fresh data...", 'info');
        captureAttendanceBtn.disabled = true;
        
        // Show skeleton loading
        attendanceResultDiv.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
        
        const [datesRes, membersRes, facesRes] = await Promise.all([
            callAppsScript('getDatesWithColumns'),
            callAppsScript('getMembers'),
            callAppsScript('getFaceData')
        ]);
        
        if (datesRes.success && datesRes.dates) dateList = datesRes.dates;
        if (membersRes.success && membersRes.members) membersList = membersRes.members;
        if (facesRes.success && facesRes.faces) {
            faceDescriptorsDB = facesRes.faces.map(f => ({ 
                name: f.name, 
                descriptor: new Float32Array(f.descriptor) 
            }));
        }
        
        dataVersion = Date.now().toString();
        saveFaceDataToLocal();
        populateDateSelect();
        
        updateDebug(attendanceDebugDiv, `✅ Loaded ${membersList.length} members, ${faceDescriptorsDB.length} faces, ${dateList.length} dates`, 'success');
        captureAttendanceBtn.disabled = false;
        return true;
    }
    
    function populateDateSelect() {
        attendanceDateSelect.innerHTML = '<option value="">-- Select Date --</option>';
        dateList.forEach(dateInfo => {
            const option = document.createElement('option');
            option.value = dateInfo.date;
            option.textContent = formatDateArabic(dateInfo.date);
            attendanceDateSelect.appendChild(option);
        });
    }
    
    // ==================== BATCH ATTENDANCE QUEUE ====================
    async function flushAttendanceQueue() {
        if (syncQueue.length === 0) return;
        
        const batch = [...syncQueue];
        syncQueue = [];
        
        for (const item of batch) {
            await callAppsScript('markAttendance', { name: item.name, date: item.date });
        }
        updateDebug(attendanceDebugDiv, `Synced ${batch.length} attendance records`, 'success');
    }
    
    function queueAttendance(name, date) {
        syncQueue.push({ name, date, timestamp: Date.now() });
        // Flush every 10 records or after 30 seconds
        if (syncQueue.length >= 10) flushAttendanceQueue();
        setTimeout(() => flushAttendanceQueue(), 30000);
    }
    
    // ==================== MARK ATTENDANCE (with queue) ====================
    async function markAttendance(name, date) {
        try {
            const result = await callAppsScript('markAttendance', { name, date });
            if (result.success) {
                if (result.alreadyMarked) {
                    updateDebug(attendanceDebugDiv, `⚠️ ${name} already marked`, 'warning');
                    return { success: true, alreadyMarked: true };
                }
                updateDebug(attendanceDebugDiv, `✅ ${name} marked`, 'success');
                return { success: true };
            }
            return { success: false, error: result.error };
        } catch (error) {
            return { success: false, error: error.message };
        }
    }
    
    // ==================== LOAD ATTENDANCE FOR DATE ====================
    async function loadAttendanceForDate(date) {
        if (!date) {
            attendanceResultDiv.innerHTML = '<div style="text-align:center;">📋 Select a date</div>';
            return;
        }
        
        attendanceResultDiv.innerHTML = '<div style="text-align:center;">⏳ Loading... <span class="spinner"></span></div>';
        const result = await callAppsScript('getAttendanceForDate', { date });
        
        if (result.success && result.attendance) {
            if (result.attendance.length === 0) {
                attendanceResultDiv.innerHTML = '<div style="text-align:center;">📋 No attendance recorded</div>';
            } else {
                let html = `<div><strong>✅ Present (${result.attendance.length}/${membersList.length})</strong></div>`;
                result.attendance.forEach(member => {
                    html += `<div class="attendance-item"><span>⛪ ${member.name}</span><span class="badge">Present</span></div>`;
                });
                attendanceResultDiv.innerHTML = html;
            }
        } else {
            attendanceResultDiv.innerHTML = '<div style="text-align:center;">📋 No attendance recorded</div>';
        }
    }
    
    // ==================== FACE RECOGNITION (with tf.tidy for memory) ====================
    async function getFaceWithDescriptor(video) {
        if (!modelsLoaded || !video.videoWidth) return null;
        
        return tf.tidy(() => {
            return faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();
        });
    }
    
    function findBestMatch(descriptor, threshold = 0.6) {
        if (faceDescriptorsDB.length === 0) return null;
        
        let bestMatch = null;
        let bestDistance = Infinity;
        
        for (const person of faceDescriptorsDB) {
            const distance = faceapi.euclideanDistance(descriptor, person.descriptor);
            if (distance < bestDistance) {
                bestDistance = distance;
                bestMatch = person;
            }
        }
        
        return bestDistance <= threshold ? bestMatch : null;
    }
    
    // ==================== DRAW FACE RECTANGLE (optimized) ====================
    async function drawFaceDetection(video, canvas, ctx, indicator) {
        if (!modelsLoaded || !video.videoWidth) return false;
        
        try {
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
            
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (detection) {
                const resized = faceapi.resizeResults(detection, displaySize);
                const box = resized.box;
                
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(box.x, box.y, box.width, box.height);
                
                if (indicator) {
                    indicator.innerHTML = '✅ Face detected';
                    indicator.style.background = 'rgba(46, 125, 50, 0.9)';
                }
                return true;
            } else {
                if (indicator) {
                    indicator.innerHTML = '🔍 No face';
                    indicator.style.background = 'rgba(0,0,0,0.7)';
                }
                return false;
            }
        } catch(e) {
            return false;
        }
    }
    
    // ==================== DETECTION LOOP (throttled) ====================
    let lastDetectionFrame = 0;
    
    async function detectionLoop() {
        if (!modelsLoaded || !attendanceVideo.videoWidth) return;
        
        const now = Date.now();
        if (now - lastDetectionFrame < DETECTION_INTERVAL_MS) {
            requestAnimationFrame(detectionLoop);
            return;
        }
        lastDetectionFrame = now;
        
        await drawFaceDetection(attendanceVideo, attendanceCanvas, attendanceCtx, attendanceFaceIndicator);
        
        // Auto-mark attendance when face detected
        if (currentSelectedDate && !isProcessing && (now - lastMarkTime) > MARK_COOLDOWN_MS) {
            const detection = await getFaceWithDescriptor(attendanceVideo);
            if (detection && detection.descriptor) {
                const match = findBestMatch(detection.descriptor, 0.6);
                if (match && match.name !== lastRecognizedName) {
                    lastRecognizedName = match.name;
                    lastMarkTime = now;
                    
                    const person = membersList.find(m => m.name === match.name);
                    if (person) {
                        updateStatus(attendanceStatusDiv, `✅ Recognized: ${match.name}`, "success");
                        const result = await markAttendance(match.name, currentSelectedDate);
                        if (result.success && !result.alreadyMarked) {
                            await loadAttendanceForDate(currentSelectedDate);
                        }
                    }
                }
                if (detection.descriptor) tf.dispose(detection.descriptor);
            }
        }
        
        requestAnimationFrame(detectionLoop);
    }
    
    // ==================== CAMERA (lower resolution for performance) ====================
    async function startCamera(videoElement, cameraType, ctx, canvas, indicator) {
        try {
            const constraints = { 
                video: { 
                    facingMode: { exact: cameraType }, 
                    width: { ideal: 480 }, 
                    height: { ideal: 360 }  // Lower resolution for performance
                } 
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = stream;
            return new Promise((resolve) => {
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    resolve(stream);
                };
            });
        } catch(err) {
            try {
                const constraints = { 
                    video: { 
                        facingMode: cameraType, 
                        width: { ideal: 480 }, 
                        height: { ideal: 360 } 
                    } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                return new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        resolve(stream);
                    };
                });
            } catch(err2) {
                updateDebug(attendanceDebugDiv, `Camera Error: ${err2.message}`, 'error');
                return null;
            }
        }
    }
    
    async function startAttendanceCamera() {
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        attendanceStream = await startCamera(attendanceVideo, currentAttendanceCamera, attendanceCtx, attendanceCanvas, attendanceFaceIndicator);
        if (attendanceStream) {
            updateDebug(attendanceDebugDiv, `Camera started (${currentAttendanceCamera})`, 'success');
            detectionLoop();
        }
        return !!attendanceStream;
    }
    
    async function startRegisterCamera() {
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
        registerStream = await startCamera(registerVideo, currentRegisterCamera, registerCtx, registerCanvas, registerFaceIndicator);
        return !!registerStream;
    }
    
    // ==================== REGISTER FACE ====================
    async function registerFace() {
        if (isProcessing) return;
        
        const name = newUserNameInput.value.trim();
        if (!name) {
            updateStatus(registerStatusDiv, "⚠️ Enter name", "error");
            return;
        }
        
        if (!modelsLoaded) { await loadModels(); if (!modelsLoaded) return; }
        if (!registerVideo.videoWidth) {
            await startRegisterCamera();
            setTimeout(() => registerFace(), 1000);
            return;
        }
        
        isProcessing = true;
        captureRegisterBtn.disabled = true;
        updateStatus(registerStatusDiv, "📸 Capturing...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(registerVideo);
            if (!detection || !detection.descriptor) {
                updateStatus(registerStatusDiv, "😞 No face detected", "error");
                return;
            }
            
            const descriptorArray = Array.from(detection.descriptor);
            const result = await callAppsScript('saveFace', { name, descriptor: JSON.stringify(descriptorArray) });
            
            if (result.success) {
                updateStatus(registerStatusDiv, `✅ Registered ${name}!`, "success");
                faceDescriptorsDB.push({ name, descriptor: new Float32Array(descriptorArray) });
                saveFaceDataToLocal();
                newUserNameInput.value = '';
            } else {
                updateStatus(registerStatusDiv, `❌ Failed: ${result.error}`, "error");
            }
        } catch (error) {
            updateStatus(registerStatusDiv, `Error: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureRegisterBtn.disabled = false;
        }
    }
    
    // ==================== MANUAL ATTENDANCE ====================
    let currentSelectedDate = null;
    
    async function takeAttendance() {
        const selectedDate = attendanceDateSelect.value;
        if (!selectedDate) {
            updateStatus(attendanceStatusDiv, "⚠️ Select a date first", "warning");
            return;
        }
        
        if (isProcessing) return;
        if (!modelsLoaded) { await loadModels(); if (!modelsLoaded) return; }
        if (!attendanceVideo.videoWidth) {
            await startAttendanceCamera();
            setTimeout(() => takeAttendance(), 1000);
            return;
        }
        
        isProcessing = true;
        captureAttendanceBtn.disabled = true;
        updateStatus(attendanceStatusDiv, "🔍 Detecting...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(attendanceVideo);
            if (!detection || !detection.descriptor) {
                updateStatus(attendanceStatusDiv, "😞 No face detected", "error");
                return;
            }
            
            const match = findBestMatch(detection.descriptor, 0.6);
            if (!match) {
                updateStatus(attendanceStatusDiv, "❌ Face not registered", "error");
                return;
            }
            
            const result = await markAttendance(match.name, selectedDate);
            if (result.success && !result.alreadyMarked) {
                updateStatus(attendanceStatusDiv, `✅ ${match.name} marked!`, "success");
                await loadAttendanceForDate(selectedDate);
            } else if (result.alreadyMarked) {
                updateStatus(attendanceStatusDiv, `⚠️ ${match.name} already marked`, "warning");
            }
        } catch (error) {
            updateStatus(attendanceStatusDiv, `Error: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureAttendanceBtn.disabled = false;
        }
    }
    
    // ==================== MODE SWITCHING ====================
    function setMode(mode) {
        if (mode === "attendance") {
            attendancePanelDiv.classList.add("active-panel");
            registerPanelDiv.classList.remove("active-panel");
            takeAttendanceBtn.classList.add("active");
            registerFaceBtn.classList.remove("active");
            if (registerStream) { registerStream.getTracks().forEach(t => t.stop()); registerStream = null; }
            startAttendanceCamera();
        } else {
            attendancePanelDiv.classList.remove("active-panel");
            registerPanelDiv.classList.add("active-panel");
            registerFaceBtn.classList.add("active");
            takeAttendanceBtn.classList.remove("active");
            if (attendanceStream) { attendanceStream.getTracks().forEach(t => t.stop()); attendanceStream = null; }
            startRegisterCamera();
        }
    }
    
    // ==================== INIT ====================
    async function init() {
        attendanceVideo = document.getElementById('attendanceVideo');
        attendanceCanvas = document.getElementById('attendanceCanvas');
        attendanceCtx = attendanceCanvas.getContext('2d');
        registerVideo = document.getElementById('registerVideo');
        registerCanvas = document.getElementById('registerCanvas');
        registerCtx = registerCanvas.getContext('2d');
        
        function setupCanvas() {
            const wrapper = document.querySelector('.video-wrapper');
            if (wrapper) {
                const rect = wrapper.getBoundingClientRect();
                if (rect.width > 0) {
                    attendanceCanvas.width = rect.width;
                    attendanceCanvas.height = rect.height;
                    registerCanvas.width = rect.width;
                    registerCanvas.height = rect.height;
                }
            }
        }
        setTimeout(setupCanvas, 100);
        window.addEventListener('resize', setupCanvas);
        
        attendanceFrontCam.onclick = () => { currentAttendanceCamera = 'user'; startAttendanceCamera(); };
        attendanceBackCam.onclick = () => { currentAttendanceCamera = 'environment'; startAttendanceCamera(); };
        registerFrontCam.onclick = () => { currentRegisterCamera = 'user'; startRegisterCamera(); };
        registerBackCam.onclick = () => { currentRegisterCamera = 'environment'; startRegisterCamera(); };
        
        captureAttendanceBtn.onclick = takeAttendance;
        captureRegisterBtn.onclick = registerFace;
        retryDataBtn.onclick = () => loadAllData(true);
        takeAttendanceBtn.onclick = () => setMode("attendance");
        registerFaceBtn.onclick = () => setMode("register");
        
        attendanceDateSelect.onchange = async () => {
            currentSelectedDate = attendanceDateSelect.value;
            if (currentSelectedDate) await loadAttendanceForDate(currentSelectedDate);
        };
        
        updateDebug(attendanceDebugDiv, "🚀 Starting...", 'info');
        
        try {
            await tf.setBackend('webgl');
            await tf.ready();
        } catch (e) {
            await tf.setBackend('cpu');
            await tf.ready();
        }
        
        await loadModels();
        await startAttendanceCamera();
        await loadAllData();
        
        updateDebug(attendanceDebugDiv, "✅ System Ready!", 'success');
        captureAttendanceBtn.disabled = false;
        
        // Periodic sync
        setInterval(() => flushAttendanceQueue(), 30000);
    }
    
    window.onload = init;
    window.onbeforeunload = () => {
        if (detectionInterval) clearInterval(detectionInterval);
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
        flushAttendanceQueue();
    };
</script>
</body>
