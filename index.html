<script>
    // ==================== CONFIGURATION ====================
    // Use Google Sheets published JSON URL (NO CORS issues!)
    const SPREADSHEET_ID = '1VYIPqwlbTAA8_NvXT6pUMxIcT8f6Jq2hoayGt1UMNr0';
const SHEET1_NAME = 'Sheet1';
const SHEET2_NAME = 'Sheet2';

// ==================== CORS HELPER ====================
function addCORSHeaders(output) {
  output.setHeader('Access-Control-Allow-Origin', '*');
  output.setHeader('Access-Control-Allow-Methods', 'GET, POST, OPTIONS');
  output.setHeader('Access-Control-Allow-Headers', 'Content-Type');
  output.setHeader('Access-Control-Max-Age', '3600');
  return output;
}

// ==================== DO GET ENDPOINT ====================
function doGet(e) {
  const output = ContentService.createTextOutput();
  addCORSHeaders(output);
  output.setMimeType(ContentService.MimeType.JSON);
  
  try {
    const action = e.parameter.action;
    
    if (action === 'getMembers') {
      const result = getMembers();
      output.setContent(JSON.stringify(result));
    } 
    else if (action === 'getFaceData') {
      const result = getFaceData();
      output.setContent(JSON.stringify(result));
    }
    else if (action === 'markAttendance') {
      const name = e.parameter.name;
      const date = e.parameter.date;
      const result = markAttendance(name, date);
      output.setContent(JSON.stringify(result));
    }
    else {
      output.setContent(JSON.stringify({ success: false, error: 'Invalid action' }));
    }
  } catch (error) {
    output.setContent(JSON.stringify({ success: false, error: error.toString() }));
  }
  
  return output;
}

// ==================== DO POST ENDPOINT ====================
function doPost(e) {
  const output = ContentService.createTextOutput();
  addCORSHeaders(output);
  output.setMimeType(ContentService.MimeType.JSON);
  
  try {
    let params;
    if (e.postData && e.postData.contents) {
      params = JSON.parse(e.postData.contents);
    } else {
      return output.setContent(JSON.stringify({ success: false, error: 'No data received' }));
    }
    
    const action = params.action;
    
    if (action === 'saveFace') {
      const result = saveFaceData(params.name, params.descriptor);
      output.setContent(JSON.stringify(result));
    }
    else {
      output.setContent(JSON.stringify({ success: false, error: 'Invalid action' }));
    }
  } catch (error) {
    output.setContent(JSON.stringify({ success: false, error: error.toString() }));
  }
  
  return output;
}

// ==================== OPTIONS HANDLER FOR CORS PREFLIGHT ====================
function doOptions(e) {
  const output = ContentService.createTextOutput();
  addCORSHeaders(output);
  output.setContent(JSON.stringify({ success: true }));
  return output;
}

// ==================== GET ALL MEMBERS FROM SHEET1 ====================
function getMembers() {
  try {
    const sheet = SpreadsheetApp.openById(SPREADSHEET_ID).getSheetByName(SHEET1_NAME);
    const lastRow = sheet.getLastRow();
    
    if (lastRow <= 1) {
      return { success: true, members: [] };
    }
    
    const namesRange = sheet.getRange(2, 1, lastRow - 1, 1);
    const names = namesRange.getValues();
    
    const members = [];
    for (let i = 0; i < names.length; i++) {
      const name = names[i][0];
      if (name && name.toString().trim() !== '') {
        members.push({
          name: name.toString().trim(),
          rowIndex: i + 2
        });
      }
    }
    
    return { success: true, members: members };
    
  } catch (error) {
    return { success: false, error: error.toString() };
  }
}

// ==================== GET ALL FACE DESCRIPTORS FROM SHEET2 ====================
function getFaceData() {
  try {
    let sheet = SpreadsheetApp.openById(SPREADSHEET_ID).getSheetByName(SHEET2_NAME);
    
    if (!sheet) {
      sheet = SpreadsheetApp.openById(SPREADSHEET_ID).insertSheet(SHEET2_NAME);
      sheet.getRange(1, 1).setValue('Name');
      sheet.getRange(1, 2).setValue('FaceDescriptor');
      sheet.getRange(1, 3).setValue('LastUpdated');
      return { success: true, faces: [] };
    }
    
    const lastRow = sheet.getLastRow();
    if (lastRow <= 1) {
      return { success: true, faces: [] };
    }
    
    const data = sheet.getRange(2, 1, lastRow - 1, 3).getValues();
    const faces = [];
    
    for (let i = 0; i < data.length; i++) {
      const name = data[i][0];
      const descriptorStr = data[i][1];
      
      if (name && descriptorStr) {
        try {
          const descriptorArray = JSON.parse(descriptorStr);
          faces.push({
            name: name.toString().trim(),
            descriptor: descriptorArray
          });
        } catch (e) {
          console.error(`Error parsing descriptor for ${name}: ${e}`);
        }
      }
    }
    
    return { success: true, faces: faces };
    
  } catch (error) {
    return { success: false, error: error.toString() };
  }
}

// ==================== SAVE FACE DESCRIPTOR TO SHEET2 ====================
function saveFaceData(name, descriptorArray) {
  try {
    let sheet = SpreadsheetApp.openById(SPREADSHEET_ID).getSheetByName(SHEET2_NAME);
    
    if (!sheet) {
      sheet = SpreadsheetApp.openById(SPREADSHEET_ID).insertSheet(SHEET2_NAME);
      sheet.getRange(1, 1).setValue('Name');
      sheet.getRange(1, 2).setValue('FaceDescriptor');
      sheet.getRange(1, 3).setValue('LastUpdated');
    }
    
    const descriptorJSON = JSON.stringify(descriptorArray);
    const lastRow = sheet.getLastRow();
    let existingRow = -1;
    const cleanName = name.toString().trim();
    
    if (lastRow > 1) {
      const names = sheet.getRange(2, 1, lastRow - 1, 1).getValues();
      for (let i = 0; i < names.length; i++) {
        if (names[i][0] && names[i][0].toString().trim() === cleanName) {
          existingRow = i + 2;
          break;
        }
      }
    }
    
    const timestamp = new Date().toISOString();
    
    if (existingRow > 0) {
      sheet.getRange(existingRow, 2).setValue(descriptorJSON);
      sheet.getRange(existingRow, 3).setValue(timestamp);
    } else {
      const newRow = lastRow + 1;
      sheet.getRange(newRow, 1).setValue(cleanName);
      sheet.getRange(newRow, 2).setValue(descriptorJSON);
      sheet.getRange(newRow, 3).setValue(timestamp);
    }
    
    return { success: true, message: `Face saved for ${cleanName}` };
    
  } catch (error) {
    return { success: false, error: error.toString() };
  }
}

// ==================== MARK ATTENDANCE IN SHEET1 ====================
function markAttendance(name, dateStr) {
  try {
    const sheet = SpreadsheetApp.openById(SPREADSHEET_ID).getSheetByName(SHEET1_NAME);
    const cleanName = name.toString().trim();
    
    // Find person's row
    const lastRow = sheet.getLastRow();
    const namesRange = sheet.getRange(2, 1, lastRow - 1, 1);
    const names = namesRange.getValues();
    
    let personRow = -1;
    for (let i = 0; i < names.length; i++) {
      if (names[i][0] && names[i][0].toString().trim() === cleanName) {
        personRow = i + 2;
        break;
      }
    }
    
    if (personRow === -1) {
      throw new Error(`Person "${cleanName}" not found in sheet`);
    }
    
    // Find date column
    const headers = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];
    let dateColumn = -1;
    const targetDate = new Date(dateStr);
    targetDate.setHours(0, 0, 0, 0);
    
    for (let i = 0; i < headers.length; i++) {
      if (headers[i] instanceof Date) {
        const headerDate = new Date(headers[i]);
        headerDate.setHours(0, 0, 0, 0);
        if (headerDate.getTime() === targetDate.getTime()) {
          dateColumn = i + 1;
          break;
        }
      }
    }
    
    if (dateColumn === -1) {
      const lastCol = sheet.getLastColumn() + 1;
      const newDate = new Date(dateStr);
      newDate.setHours(0, 0, 0, 0);
      sheet.getRange(1, lastCol).setValue(newDate);
      dateColumn = lastCol;
    }
    
    // Check if already marked
    const currentValue = sheet.getRange(personRow, dateColumn).getValue();
    if (currentValue === '⛪') {
      return { success: true, message: `Already marked for ${cleanName}`, alreadyMarked: true };
    }
    
    // Mark attendance
    sheet.getRange(personRow, dateColumn).setValue('⛪');
    updateTotalCount(sheet, personRow);
    
    return { 
      success: true, 
      message: `Attendance marked for ${cleanName} on ${dateStr}`,
      row: personRow,
      column: dateColumn
    };
    
  } catch (error) {
    return { success: false, error: error.toString() };
  }
}

// ==================== UPDATE TOTAL COUNT ====================
function updateTotalCount(sheet, personRow) {
  try {
    const headers = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];
    let totalCol = -1;
    
    for (let i = 0; i < headers.length; i++) {
      if (headers[i] === 'المجموع' || headers[i] === 'Total') {
        totalCol = i + 1;
        break;
      }
    }
    
    if (totalCol === -1) {
      totalCol = sheet.getLastColumn();
    }
    
    let count = 0;
    for (let col = 2; col < totalCol; col++) {
      const value = sheet.getRange(personRow, col).getValue();
      if (value === '⛪') {
        count++;
      }
    }
    
    sheet.getRange(personRow, totalCol).setValue(count);
    
  } catch (error) {
    console.error(`Error updating total count: ${error}`);
  }
}

// ==================== GET TODAY'S ATTENDANCE REPORT ====================
function getTodayAttendance() {
  try {
    const sheet = SpreadsheetApp.openById(SPREADSHEET_ID).getSheetByName(SHEET1_NAME);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const headers = sheet.getRange(1, 1, 1, sheet.getLastColumn()).getValues()[0];
    let todayColumn = -1;
    
    for (let i = 0; i < headers.length; i++) {
      if (headers[i] instanceof Date) {
        const headerDate = new Date(headers[i]);
        headerDate.setHours(0, 0, 0, 0);
        if (headerDate.getTime() === today.getTime()) {
          todayColumn = i + 1;
          break;
        }
      }
    }
    
    if (todayColumn === -1) {
      return { success: true, attendees: [] };
    }
    
    const lastRow = sheet.getLastRow();
    const names = sheet.getRange(2, 1, lastRow - 1, 1).getValues();
    const attendance = sheet.getRange(2, todayColumn, lastRow - 1, 1).getValues();
    
    const attendees = [];
    for (let i = 0; i < attendance.length; i++) {
      if (attendance[i][0] === '⛪') {
        attendees.push(names[i][0]);
      }
    }
    
    return { success: true, attendees: attendees, date: today.toISOString() };
    
  } catch (error) {
    return { success: false, error: error.toString() };
  }
}

            localStorage.setItem('face_descriptors', JSON.stringify(existing));
            
            // Update in-memory DB
            const newDescFloat = { name, descriptor: new Float32Array(descriptorArray) };
            const memIdx = faceDescriptorsDB.findIndex(f => f.name === name);
            if (memIdx !== -1) faceDescriptorsDB[memIdx] = newDescFloat;
            else faceDescriptorsDB.push(newDescFloat);
            
            updateDebug(registerDebugDiv, `⚠️ Saved to local storage only (Google Sheets unavailable)`);
            return { success: true, warning: 'Saved locally only' };
        }
    }
    
    // Mark attendance in Google Sheets (Sheet1)
    async function markAttendanceInSheet(name) {
        const todayStr = getLocalDate();
        
        try {
            updateDebug(attendanceDebugDiv, `📤 Marking attendance for ${name}...`);
            const response = await fetch(`${APPS_SCRIPT_URL}?action=markAttendance&name=${encodeURIComponent(name)}&date=${todayStr}`);
            const result = await response.json();
            
            if (result.success) {
                if (result.alreadyMarked) {
                    updateDebug(attendanceDebugDiv, `ℹ️ ${name} already marked today`);
                } else {
                    updateDebug(attendanceDebugDiv, `✅ Attendance marked for ${name} on ${todayStr}`);
                }
                return result;
            } else {
                throw new Error(result.error || 'Unknown error');
            }
        } catch (err) {
            updateDebug(attendanceDebugDiv, `❌ Error marking attendance: ${err.message}`, true);
            
            // Fallback to localStorage
            const stored = localStorage.getItem('attendance_log') || '[]';
            const log = JSON.parse(stored);
            const alreadyMarked = log.some(entry => entry.name === name && entry.date === todayStr);
            
            if (!alreadyMarked) {
                log.push({ name, date: todayStr, timestamp: new Date().toISOString() });
                localStorage.setItem('attendance_log', JSON.stringify(log));
                updateDebug(attendanceDebugDiv, `⚠️ Attendance saved locally only (Google Sheets unavailable)`);
                return { success: true, alreadyMarked: false, localOnly: true };
            }
            return { success: true, alreadyMarked: true };
        }
    
    // Display today's attendance from local storage
    function displayTodayAttendance() {
        const todayStr = getLocalDate();
        const stored = localStorage.getItem('attendance_log') || '[]';
        const log = JSON.parse(stored);
        const todayAttendance = log.filter(entry => entry.date === todayStr);
        
        attendanceResultDiv.innerHTML = '';
        if (todayAttendance.length === 0) {
            attendanceResultDiv.innerHTML = '<div style="text-align:center;color:#6c757d;">📋 No attendance recorded yet today</div>';
        } else {
            todayAttendance.forEach(entry => {
                attendanceResultDiv.innerHTML += `<div class="attendance-item"><span>⛪ ${entry.name}</span><span class="badge">${entry.date}</span></div>`;
            });
        }
    }
    
    // ==================== FACE RECOGNITION ====================
    async function loadModels() {
        if(modelsLoaded) return true;
        
        updateStatus(attendanceStatusDiv, "📥 Loading AI models...", "info");
        updateProgress(attendanceProgress, 10);
        
        try {
            updateDebug(attendanceDebugDiv, `Loading models from: ${MODEL_URL}`);
            
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 40);
            updateDebug(attendanceDebugDiv, "✓ SSD MobileNet loaded");
            
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 70);
            updateDebug(attendanceDebugDiv, "✓ Face Landmark loaded");
            
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            updateProgress(attendanceProgress, 100);
            updateDebug(attendanceDebugDiv, "✓ Face Recognition loaded");
            
            modelsLoaded = true;
            updateStatus(attendanceStatusDiv, "✅ Models ready! Face detection active", "success");
            updateStatus(registerStatusDiv, "✅ Models ready!", "success");
            
            setTimeout(() => updateProgress(attendanceProgress, 0), 1000);
            return true;
        } catch(e) {
            updateDebug(attendanceDebugDiv, `ERROR: ${e.message}`, true);
            updateStatus(attendanceStatusDiv, `❌ Failed: ${e.message}`, "error");
            return false;
        }
    }
    
    async function detectFace(video) {
        if (!modelsLoaded || !video.videoWidth) return null;
        try {
            return await faceapi.detectSingleFace(video);
        } catch(e) {
            return null;
        }
    }
    
    async function getFaceWithDescriptor(video) {
        if (!modelsLoaded || !video.videoWidth) return null;
        
        for (let attempt = 1; attempt <= 6; attempt++) {
            try {
                const detection = await faceapi.detectSingleFace(video)
                    .withFaceLandmarks()
                    .withFaceDescriptor();
                if (detection && detection.descriptor) {
                    return detection;
                }
            } catch(e) {}
            await new Promise(r => setTimeout(r, 500));
        }
        return null;
    }
    
    async function drawDetection(video, canvas, indicator) {
        if (!modelsLoaded || !video.videoWidth) return false;
        
        try {
            const detection = await detectFace(video);
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(canvas, displaySize);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (detection) {
                const resized = faceapi.resizeResults(detection, displaySize);
                faceapi.draw.drawDetections(canvas, [resized]);
                if (indicator) {
                    indicator.innerHTML = '✅ Face detected!';
                    indicator.style.background = 'rgba(46, 125, 50, 0.9)';
                }
                return true;
            } else {
                if (indicator) {
                    indicator.innerHTML = '🔍 No face detected';
                    indicator.style.background = 'rgba(0,0,0,0.7)';
                }
                return false;
            }
        } catch(e) {
            return false;
        }
    }
    
    function startDetectionLoop(video, canvas, indicator) {
        if (detectionInterval) clearInterval(detectionInterval);
        detectionInterval = setInterval(async () => {
            await drawDetection(video, canvas, indicator);
        }, 150);
    }
    
    function findBestMatch(descriptor, threshold = 0.6) {
        if (faceDescriptorsDB.length === 0) return null;
        
        let bestMatch = null;
        let bestDistance = Infinity;
        
        for (const person of faceDescriptorsDB) {
            const distance = faceapi.euclideanDistance(descriptor, person.descriptor);
            if (distance < bestDistance) {
                bestDistance = distance;
                bestMatch = person;
            }
        }
        
        updateDebug(attendanceDebugDiv, `Best match: ${bestMatch?.name} (distance: ${bestDistance.toFixed(4)})`);
        return bestDistance <= threshold ? bestMatch : null;
    }
    
    // ==================== CAMERA SETUP ====================
    async function startCamera(videoElement, cameraType) {
        try {
            const constraints = { 
                video: { 
                    facingMode: cameraType,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            videoElement.srcObject = stream;
            return new Promise((resolve) => {
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    resolve(stream);
                };
            });
        } catch(err) {
            updateDebug(attendanceDebugDiv, "Camera Error: " + err.message, true);
            return null;
        }
    }
    
    async function startAttendanceCamera() {
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if (detectionInterval) clearInterval(detectionInterval);
        
        attendanceStream = await startCamera(attendanceVideo, currentAttendanceCamera);
        if (attendanceStream) {
            const info = document.getElementById('attendanceCameraInfo');
            if (info) info.innerHTML = currentAttendanceCamera === 'user' ? '🤳 Front' : '📱 Back';
            updateDebug(attendanceDebugDiv, `Camera started: ${currentAttendanceCamera === 'user' ? 'Front' : 'Back'}`);
            startDetectionLoop(attendanceVideo, attendanceCanvas, attendanceFaceIndicator);
            return true;
        }
        return false;
    }
    
    async function startRegisterCamera() {
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
        
        registerStream = await startCamera(registerVideo, currentRegisterCamera);
        if (registerStream) {
            const info = document.getElementById('registerCameraInfo');
            if (info) info.innerHTML = currentRegisterCamera === 'user' ? '🤳 Front' : '📱 Back';
            updateDebug(registerDebugDiv, `Camera started: ${currentRegisterCamera === 'user' ? 'Front' : 'Back'}`);
            startDetectionLoop(registerVideo, registerCanvas, registerFaceIndicator);
            return true;
        }
        return false;
    }
    
    function switchAttendanceCamera(cameraType) {
        currentAttendanceCamera = cameraType;
        attendanceFrontCam.classList.remove('active');
        attendanceBackCam.classList.remove('active');
        if (cameraType === 'user') attendanceFrontCam.classList.add('active');
        else attendanceBackCam.classList.add('active');
        startAttendanceCamera();
    }
    
    function switchRegisterCamera(cameraType) {
        currentRegisterCamera = cameraType;
        registerFrontCam.classList.remove('active');
        registerBackCam.classList.remove('active');
        if (cameraType === 'user') registerFrontCam.classList.add('active');
        else registerBackCam.classList.add('active');
        startRegisterCamera();
    }
    
    // ==================== ACTIONS ====================
    async function takeAttendance() {
        console.log("=== TAKE ATTENDANCE ===");
        if (isProcessing) { updateStatus(attendanceStatusDiv, "Please wait...", "warning"); return; }
        if (!modelsLoaded) { await loadModels(); if (!modelsLoaded) return; }
        if (!attendanceVideo.videoWidth) {
            await startAttendanceCamera();
            setTimeout(() => takeAttendance(), 1500);
            return;
        }
        
        isProcessing = true;
        captureAttendanceBtn.disabled = true;
        updateStatus(attendanceStatusDiv, "🔍 Detecting face...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(attendanceVideo);
            
            if (!detection || !detection.descriptor) {
                updateStatus(attendanceStatusDiv, "😞 No face detected. Try better lighting!", "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateStatus(attendanceStatusDiv, "🧠 Matching...", "info");
            const match = findBestMatch(detection.descriptor, 0.6);
            
            if (!match) {
                updateStatus(attendanceStatusDiv, "❌ Face not registered. Please register first.", "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateStatus(attendanceStatusDiv, `✅ Recognized: ${match.name}`, "success");
            const result = await markAttendanceInSheet(match.name);
            const todayStr = getLocalDate();
            
            if (result?.success) {
                displayTodayAttendance();
                updateDebug(attendanceDebugDiv, `✓ Attendance marked for ${match.name}`);
            } else {
                updateStatus(attendanceStatusDiv, `⚠️ Could not mark attendance`, "error");
            }
        } catch (error) {
            updateStatus(attendanceStatusDiv, `Error: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureAttendanceBtn.disabled = false;
        }
    }
    
    async function registerFace() {
        console.log("=== REGISTER FACE ===");
        if (isProcessing) return;
        
        const name = newUserNameInput.value.trim();
        if (!name) {
            updateStatus(registerStatusDiv, "⚠️ Please enter name", "error");
            return;
        }
        
        updateDebug(registerDebugDiv, `Starting registration for: ${name}`);
        
        if (!modelsLoaded) { await loadModels(); if (!modelsLoaded) return; }
        if (!registerVideo.videoWidth) {
            await startRegisterCamera();
            setTimeout(() => registerFace(), 1500);
            return;
        }
        
        isProcessing = true;
        captureRegisterBtn.disabled = true;
        updateStatus(registerStatusDiv, "📸 Capturing face...", "info");
        
        try {
            const detection = await getFaceWithDescriptor(registerVideo);
            
            if (!detection || !detection.descriptor) {
                updateStatus(registerStatusDiv, "😞 No face detected. Try better lighting!", "error");
                updateDebug(registerDebugDiv, "No face detected", true);
                isProcessing = false;
                captureRegisterBtn.disabled = false;
                return;
            }
            
            updateStatus(registerStatusDiv, "💾 Saving...", "info");
            const result = await saveFaceToStorage(name, detection.descriptor);
            
            if (result?.success) {
                updateStatus(registerStatusDiv, `✅ Registered ${name}!`, "success");
                updateDebug(registerDebugDiv, `✓ Successfully registered ${name}`);
                newUserNameInput.value = '';
                updateDebug(registerDebugDiv, `Total registered: ${faceDescriptorsDB.length}`);
            } else {
                updateStatus(registerStatusDiv, `❌ Failed to save`, "error");
            }
        } catch (error) {
            updateStatus(registerStatusDiv, `Error: ${error.message}`, "error");
        } finally {
            isProcessing = false;
            captureRegisterBtn.disabled = false;
        }
    }
    
    function setMode(mode) {
        if (mode === "attendance") {
            attendancePanelDiv.classList.add("active-panel");
            registerPanelDiv.classList.remove("active-panel");
            takeAttendanceBtn.classList.add("active");
            registerFaceBtn.classList.remove("active");
            if (registerStream) { registerStream.getTracks().forEach(t => t.stop()); registerStream = null; }
            startAttendanceCamera();
            displayTodayAttendance();
        } else {
            attendancePanelDiv.classList.remove("active-panel");
            registerPanelDiv.classList.add("active-panel");
            registerFaceBtn.classList.add("active");
            takeAttendanceBtn.classList.remove("active");
            if (attendanceStream) { attendanceStream.getTracks().forEach(t => t.stop()); attendanceStream = null; }
            startRegisterCamera();
        }
    }
    
    // ==================== INITIALIZATION ====================
    async function init() {
        attendanceVideo = document.getElementById('attendanceVideo');
        attendanceCanvas = document.getElementById('attendanceCanvas');
        registerVideo = document.getElementById('registerVideo');
        registerCanvas = document.getElementById('registerCanvas');
        
        function setupCanvas() {
            const wrapper = document.querySelector('.video-wrapper');
            if (wrapper) {
                const rect = wrapper.getBoundingClientRect();
                if (rect.width > 0) {
                    attendanceCanvas.width = rect.width;
                    attendanceCanvas.height = rect.height;
                    registerCanvas.width = rect.width;
                    registerCanvas.height = rect.height;
                }
            }
        }
        setTimeout(setupCanvas, 100);
        window.addEventListener('resize', setupCanvas);
        
        attendanceFrontCam.onclick = () => switchAttendanceCamera('user');
        attendanceBackCam.onclick = () => switchAttendanceCamera('environment');
        registerFrontCam.onclick = () => switchRegisterCamera('user');
        registerBackCam.onclick = () => switchRegisterCamera('environment');
        
        captureAttendanceBtn.onclick = takeAttendance;
        captureRegisterBtn.onclick = registerFace;
        takeAttendanceBtn.onclick = () => setMode("attendance");
        registerFaceBtn.onclick = () => setMode("register");
        
        updateDebug(attendanceDebugDiv, "🚀 Starting application...");
        
        try {
            await tf.setBackend('webgl');
            await tf.ready();
            updateDebug(attendanceDebugDiv, `🚀 Engine: WebGL (Fast Mode)`);
        } catch (e) {
            await tf.setBackend('cpu');
            await tf.ready();
            updateDebug(attendanceDebugDiv, `⚠️ Engine: CPU (Slow Mode)`);
        }
        
        await loadMembers();
        await loadFaceDescriptors();
        await loadModels();
        await startAttendanceCamera();
        displayTodayAttendance();
        
        updateDebug(attendanceDebugDiv, "✅ System Ready! Look for GREEN box around your face");
    }
    
    window.onload = init;
    window.onbeforeunload = () => {
        if (detectionInterval) clearInterval(detectionInterval);
        if (attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if (registerStream) registerStream.getTracks().forEach(t => t.stop());
    };
</script>
