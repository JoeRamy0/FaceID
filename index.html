<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نظام الحضور بالتعرف على الوجه | كنيسة القديس يوسف</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.15.0/dist/tf-core.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.15.0/dist/tf-converter.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #1e3c72;
            color: white;
            padding: 1.2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.6rem;
        }
        .mode-selector {
            display: flex;
            gap: 0.8rem;
            padding: 1rem 1.2rem;
            background: #f8fafd;
            border-bottom: 1px solid #ddd;
        }
        .mode-btn {
            flex: 1;
            background: white;
            border: 1px solid #bdc3d0;
            padding: 0.7rem;
            border-radius: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .mode-btn.active {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }
        .panel {
            padding: 1.2rem;
            display: none;
        }
        .panel.active-panel {
            display: block;
        }
        .video-wrapper {
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 1rem;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn-capture {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-capture:active { transform: scale(0.97);}
        .btn-capture:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .status {
            background: #eef2f7;
            border-radius: 2rem;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .status.error {
            background: #fee2e2;
            color: #c33;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #1e4663;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 2rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .result-area {
            background: #e9ecef;
            border-radius: 1.5rem;
            padding: 0.8rem;
            margin-top: 1rem;
            max-height: 250px;
            overflow-y: auto;
        }
        .attendance-item {
            background: white;
            margin: 0.3rem 0;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            background: #2e7d32;
            color: white;
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
        }
        .badge.warning {
            background: #f39c12;
        }
        .loading {
            text-align: center;
            padding: 1rem;
            font-style: italic;
            color: gray;
        }
        .small-note {
            font-size: 0.7rem;
            color: #5f6c80;
            margin-top: 0.5rem;
            text-align: center;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            background: #f1f5f9;
            padding: 0.6rem;
            color: #4a627a;
        }
        .debug-info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.5rem;
            text-align: left;
            word-break: break-all;
            background: #f8f9fa;
            padding: 0.5rem;
            border-radius: 0.5rem;
            max-height: 80px;
            overflow-y: auto;
        }
        .clear-log {
            font-size: 0.7rem;
            color: #dc3545;
            cursor: pointer;
            float: left;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>⛪ كنيسة القديس يوسف</h1>
        <p>نظام الحضور بالتعرف على الوجه</p>
    </div>
    <div class="mode-selector">
        <button id="takeAttendanceBtn" class="mode-btn active">📸 تسجيل الحضور</button>
        <button id="registerFaceBtn" class="mode-btn">🆕 تسجيل وجه جديد</button>
    </div>

    <!-- Attendance Panel -->
    <div id="attendancePanel" class="panel active-panel">
        <div class="video-wrapper">
            <video id="attendanceVideo" autoplay muted playsinline></video>
            <canvas id="attendanceCanvas"></canvas>
        </div>
        <button id="captureAttendance" class="btn-capture">🔍 تعرف على الوجه وسجل الحضور</button>
        <div id="attendanceStatus" class="status">⏳ جاري تحميل النماذج...</div>
        <div id="attendanceResult" class="result-area">
            <div style="text-align:center;color:#6c757d;">📋 سيظهر سجل الحضور هنا</div>
        </div>
        <div id="attendanceDebug" class="debug-info"></div>
    </div>

    <!-- Registration Panel -->
    <div id="registerPanel" class="panel">
        <div class="video-wrapper">
            <video id="registerVideo" autoplay muted playsinline></video>
            <canvas id="registerCanvas"></canvas>
        </div>
        <div class="input-group">
            <label>👤 الاسم بالكامل (كما هو في شيت الأسماء)</label>
            <input type="text" id="newUserName" placeholder="مثال: يوسف رامي سامي" autocomplete="off">
        </div>
        <button id="captureRegister" class="btn-capture">📸 التقاط الوجه وتسجيله</button>
        <div id="registerStatus" class="status">⏳ جاري تحميل النماذج...</div>
        <div id="registerDebug" class="debug-info"></div>
    </div>
    <div class="footer">
        🔗 متصل بـ Google Sheets | نظام التعرف على الوجه باستخدام FaceAPI
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    // استبدل هذا الرابط برابط التطبيق الخاص بك من Google Apps Script
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbMd7ZvHyMVS_yUK6ANUEn4TYhLNe9o4hHz26q3Fp2a1yMhq6FlWSmgzvhBa4-MS2nug/exec";
    
    // ==================== GLOBALS ====================
    let modelsLoaded = false;
    let attendanceVideo, attendanceCanvas, registerVideo, registerCanvas;
    let attendanceStream = null, registerStream = null;
    let membersList = [];
    let faceDescriptorsDB = [];
    let isProcessing = false;
    let attendedToday = new Set();
    
    // UI Elements
    const takeAttendanceBtn = document.getElementById('takeAttendanceBtn');
    const registerFaceBtn = document.getElementById('registerFaceBtn');
    const attendancePanelDiv = document.getElementById('attendancePanel');
    const registerPanelDiv = document.getElementById('registerPanel');
    const captureAttendanceBtn = document.getElementById('captureAttendance');
    const captureRegisterBtn = document.getElementById('captureRegister');
    const attendanceStatusDiv = document.getElementById('attendanceStatus');
    const registerStatusDiv = document.getElementById('registerStatus');
    const attendanceResultDiv = document.getElementById('attendanceResult');
    const attendanceDebugDiv = document.getElementById('attendanceDebug');
    const registerDebugDiv = document.getElementById('registerDebug');
    const newUserNameInput = document.getElementById('newUserName');
    
    // Helper: Get local date (Egypt timezone)
    function getLocalDate() {
        const d = new Date();
        const offset = 2; // Egypt UTC+2
        d.setHours(d.getHours() + offset);
        return d.toISOString().slice(0, 10);
    }
    
    // Helper: Update status with styling
    function updateStatus(element, message, type = 'info') {
        element.textContent = message;
        element.className = 'status';
        if (type === 'error') element.classList.add('error');
        if (type === 'success') element.classList.add('success');
        if (type === 'warning') element.classList.add('warning');
    }
    
    function updateDebug(element, message, isError = false) {
        const timestamp = new Date().toLocaleTimeString('ar-EG');
        const prefix = isError ? '❌' : 'ℹ️';
        element.innerHTML = `${prefix} [${timestamp}] ${message}<br>` + element.innerHTML;
        // Keep only last 10 messages
        const lines = element.innerHTML.split('<br>');
        if (lines.length > 15) {
            element.innerHTML = lines.slice(0, 15).join('<br>');
        }
    }
    
    function clearDebug(element) {
        element.innerHTML = '';
    }
    
    // ==================== GOOGLE SHEETS API ====================
    async function fetchFromSheets(action, payload = {}) {
        try {
            const params = new URLSearchParams({action, ...payload});
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`, {
                method: 'GET',
                mode: 'cors'
            });
            const data = await response.json();
            return data;
        } catch (err) {
            console.error("Fetch error:", err);
            updateDebug(attendanceDebugDiv, `خطأ في الاتصال: ${err.message}`, true);
            return { success: false, error: err.message };
        }
    }
    
    async function saveFaceToSheet(name, descriptorArray) {
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "saveFace",
                    name: name,
                    descriptor: Array.from(descriptorArray)
                })
            });
            
            const data = await response.json();
            return data;
        } catch (err) {
            console.error("Save face error:", err);
            updateDebug(registerDebugDiv, `خطأ في حفظ الوجه: ${err.message}`, true);
            return { success: false, error: err.message };
        }
    }
    
    async function loadMembers() {
        const res = await fetchFromSheets("getMembers");
        if(res && res.success && res.members) {
            membersList = res.members;
            updateDebug(attendanceDebugDiv, `✅ تم تحميل ${membersList.length} عضو`);
            return true;
        }
        updateDebug(attendanceDebugDiv, `⚠️ فشل تحميل الأعضاء: ${res?.error || 'غير معروف'}`, true);
        return false;
    }
    
    async function loadFaceDescriptors() {
        const res = await fetchFromSheets("getFaceData");
        if(res && res.success && res.faces) {
            faceDescriptorsDB = res.faces.map(f => ({
                name: f.name,
                descriptor: new Float32Array(f.descriptor)
            }));
            updateDebug(attendanceDebugDiv, `✅ تم تحميل ${faceDescriptorsDB.length} بصمة وجه`);
            return true;
        }
        return false;
    }
    
    async function markAttendanceInSheet(name) {
        const dateStr = getLocalDate();
        const res = await fetchFromSheets("markAttendance", { name, date: dateStr });
        return res;
    }
    
    // ==================== FACE RECOGNITION ====================
    async function loadModels() {
        if(modelsLoaded) return true;
        
        updateStatus(attendanceStatusDiv, "📥 جاري تحميل نماذج الذكاء الاصطناعي...", "info");
        updateStatus(registerStatusDiv, "📥 جاري تحميل نماذج الذكاء الاصطناعي...", "info");
        
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
        
        try {
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            modelsLoaded = true;
            updateStatus(attendanceStatusDiv, "✅ النماذج جاهزة! اضغط للتعرف", "success");
            updateStatus(registerStatusDiv, "✅ النماذج جاهزة! يمكنك تسجيل الوجه", "success");
            return true;
        } catch(e) {
            console.error("Model load error:", e);
            updateStatus(attendanceStatusDiv, `❌ خطأ في تحميل النماذج: ${e.message}`, "error");
            updateStatus(registerStatusDiv, `❌ خطأ في تحميل النماذج: ${e.message}`, "error");
            return false;
        }
    }
    
    async function getFaceDescriptorFromVideo(videoElement) {
        if(!videoElement.videoWidth || !videoElement.videoHeight) {
            updateDebug(attendanceDebugDiv, "الكاميرا غير جاهزة بعد");
            return null;
        }
        
        const detection = await faceapi.detectSingleFace(videoElement, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();
        
        if(!detection) {
            updateDebug(attendanceDebugDiv, "لم يتم اكتشاف وجه - تأكد من الإضاءة والنظر للكاميرا");
            return null;
        }
        
        updateDebug(attendanceDebugDiv, `✅ تم اكتشاف وجه!`);
        return detection.descriptor;
    }
    
    function findBestMatch(descriptor, threshold = 0.6) {
        if(faceDescriptorsDB.length === 0) {
            updateDebug(attendanceDebugDiv, "لا يوجد وجوه مسجلة في قاعدة البيانات");
            return null;
        }
        
        let bestMatch = null;
        let bestDistance = Infinity;
        
        for(const person of faceDescriptorsDB) {
            const distance = faceapi.euclideanDistance(descriptor, person.descriptor);
            if(distance < bestDistance) {
                bestDistance = distance;
                bestMatch = person;
            }
        }
        
        updateDebug(attendanceDebugDiv, `أفضل تطابق: ${bestMatch?.name} (المسافة: ${bestDistance.toFixed(3)})`);
        
        if(bestDistance <= threshold) {
            return bestMatch;
        }
        return null;
    }
    
    // ==================== CAMERA SETUP ====================
    async function startCameraForAttendance() {
        if(attendanceStream) {
            attendanceStream.getTracks().forEach(t => t.stop());
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
            });
            attendanceStream = stream;
            attendanceVideo.srcObject = stream;
            await attendanceVideo.play();
            updateDebug(attendanceDebugDiv, "📷 تم تشغيل الكاميرا");
            return true;
        } catch(err) {
            updateStatus(attendanceStatusDiv, "❌ لا يمكن الوصول للكاميرا", "error");
            updateDebug(attendanceDebugDiv, `خطأ في الكاميرا: ${err.message}`, true);
            return false;
        }
    }
    
    async function startCameraForRegister() {
        if(registerStream) {
            registerStream.getTracks().forEach(t => t.stop());
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
            });
            registerStream = stream;
            registerVideo.srcObject = stream;
            await registerVideo.play();
            updateDebug(registerDebugDiv, "📷 تم تشغيل الكاميرا");
            return true;
        } catch(err) {
            updateStatus(registerStatusDiv, "❌ لا يمكن الوصول للكاميرا", "error");
            updateDebug(registerDebugDiv, `خطأ في الكاميرا: ${err.message}`, true);
            return false;
        }
    }
    
    // ==================== ATTENDANCE ACTION ====================
    async function takeAttendance() {
        if(isProcessing) {
            updateStatus(attendanceStatusDiv, "⏳ جاري المعالجة... انتظر قليلاً", "warning");
            return;
        }
        
        if(!modelsLoaded) {
            updateStatus(attendanceStatusDiv, "⏳ جاري تحميل النماذج...", "info");
            await loadModels();
            if(!modelsLoaded) return;
        }
        
        if(!attendanceVideo.videoWidth) {
            updateStatus(attendanceStatusDiv, "📷 جاري تشغيل الكاميرا...", "info");
            await startCameraForAttendance();
            setTimeout(() => takeAttendance(), 1000);
            return;
        }
        
        isProcessing = true;
        captureAttendanceBtn.disabled = true;
        updateStatus(attendanceStatusDiv, "🔍 جاري اكتشاف الوجه...", "info");
        
        try {
            await new Promise(r => setTimeout(r, 300));
            const descriptor = await getFaceDescriptorFromVideo(attendanceVideo);
            
            if(!descriptor) {
                updateStatus(attendanceStatusDiv, "😞 لم يتم اكتشاف وجه. تأكد من الإضاءة وانظر للكاميرا", "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateStatus(attendanceStatusDiv, "🧠 جاري مطابقة الوجه...", "info");
            await new Promise(r => setTimeout(r, 300));
            
            const match = findBestMatch(descriptor, 0.6);
            
            if(!match) {
                updateStatus(attendanceStatusDiv, "❌ وجه غير مسجل. يرجى التسجيل أولاً", "error");
                isProcessing = false;
                captureAttendanceBtn.disabled = false;
                return;
            }
            
            updateStatus(attendanceStatusDiv, `✅ تم التعرف: ${match.name}`, "success");
            
            const result = await markAttendanceInSheet(match.name);
            const todayStr = getLocalDate();
            
            if(result && result.success) {
                if(result.alreadyMarked) {
                    updateStatus(attendanceStatusDiv, `⚠️ ${match.name} مسجل مسبقاً اليوم`, "warning");
                } else {
                    updateStatus(attendanceStatusDiv, `✅ تم تسجيل حضور ${match.name}`, "success");
                }
                
                // Append to result area (not replace)
                attendanceResultDiv.innerHTML += `
                    <div class="attendance-item">
                        <span>⛪ ${match.name}</span>
                        <span class="badge">${todayStr}</span>
                    </div>
                `;
            } else {
                updateStatus(attendanceStatusDiv, `⚠️ فشل تسجيل الحضور لـ ${match.name}`, "error");
            }
            
        } catch(error) {
            console.error("Attendance error:", error);
            updateStatus(attendanceStatusDiv, `❌ خطأ: ${error.message}`, "error");
            updateDebug(attendanceDebugDiv, `خطأ: ${error.message}`, true);
        } finally {
            isProcessing = false;
            captureAttendanceBtn.disabled = false;
        }
    }
    
    // ==================== REGISTRATION ACTION ====================
    async function registerFace() {
        if(isProcessing) return;
        
        const name = newUserNameInput.value.trim();
        if(!name) {
            updateStatus(registerStatusDiv, "⚠️ الرجاء إدخال الاسم بالكامل", "error");
            return;
        }
        
        if(!modelsLoaded) {
            updateStatus(registerStatusDiv, "⏳ جاري تحميل النماذج...", "info");
            await loadModels();
            if(!modelsLoaded) return;
        }
        
        if(!registerVideo.videoWidth) {
            updateStatus(registerStatusDiv, "📷 جاري تشغيل الكاميرا...", "info");
            await startCameraForRegister();
            setTimeout(() => registerFace(), 1000);
            return;
        }
        
        isProcessing = true;
        captureRegisterBtn.disabled = true;
        updateStatus(registerStatusDiv, "📸 جاري التقاط الوجه...", "info");
        
        try {
            await new Promise(r => setTimeout(r, 500));
            const descriptor = await getFaceDescriptorFromVideo(registerVideo);
            
            if(!descriptor) {
                updateStatus(registerStatusDiv, "😞 لم يتم اكتشاف وجه. حاول مرة أخرى", "error");
                isProcessing = false;
                captureRegisterBtn.disabled = false;
                return;
            }
            
            updateStatus(registerStatusDiv, "💾 جاري حفظ الوجه...", "info");
            const result = await saveFaceToSheet(name, descriptor);
            
            if(result && result.success) {
                updateStatus(registerStatusDiv, `✅ تم تسجيل الوجه لـ ${name} بنجاح!`, "success");
                updateDebug(registerDebugDiv, `✅ تم تسجيل ${name}`);
                newUserNameInput.value = '';
                
                // Update local database
                const newDesc = { name, descriptor: new Float32Array(descriptor) };
                const idx = faceDescriptorsDB.findIndex(f => f.name === name);
                if(idx !== -1) faceDescriptorsDB[idx] = newDesc;
                else faceDescriptorsDB.push(newDesc);
            } else {
                updateStatus(registerStatusDiv, `❌ فشل تسجيل الوجه: ${result?.error || 'خطأ غير معروف'}`, "error");
            }
            
        } catch(error) {
            console.error("Registration error:", error);
            updateStatus(registerStatusDiv, `❌ خطأ: ${error.message}`, "error");
            updateDebug(registerDebugDiv, `خطأ: ${error.message}`, true);
        } finally {
            isProcessing = false;
            captureRegisterBtn.disabled = false;
        }
    }
    
    // ==================== MODE SWITCHING ====================
    async function setMode(mode) {
        if(mode === "attendance") {
            attendancePanelDiv.classList.add("active-panel");
            registerPanelDiv.classList.remove("active-panel");
            takeAttendanceBtn.classList.add("active");
            registerFaceBtn.classList.remove("active");
            
            if(registerStream) {
                registerStream.getTracks().forEach(t => t.stop());
                registerStream = null;
            }
            await startCameraForAttendance();
        } else {
            attendancePanelDiv.classList.remove("active-panel");
            registerPanelDiv.classList.add("active-panel");
            registerFaceBtn.classList.add("active");
            takeAttendanceBtn.classList.remove("active");
            
            if(attendanceStream) {
                attendanceStream.getTracks().forEach(t => t.stop());
                attendanceStream = null;
            }
            await startCameraForRegister();
        }
    }
    
    // ==================== INITIALIZATION ====================
    async function init() {
        attendanceVideo = document.getElementById('attendanceVideo');
        attendanceCanvas = document.getElementById('attendanceCanvas');
        registerVideo = document.getElementById('registerVideo');
        registerCanvas = document.getElementById('registerCanvas');
        
        // Set canvas dimensions
        function setupCanvas() {
            const wrapper = document.querySelector('.video-wrapper');
            if(wrapper && wrapper.children[0]) {
                const rect = wrapper.getBoundingClientRect();
                attendanceCanvas.width = rect.width;
                attendanceCanvas.height = rect.height;
                registerCanvas.width = rect.width;
                registerCanvas.height = rect.height;
            }
        }
        setTimeout(setupCanvas, 100);
        window.addEventListener('resize', setupCanvas);
        
        updateDebug(attendanceDebugDiv, "🚀 جاري تشغيل التطبيق...");
        updateDebug(registerDebugDiv, "🚀 جاري تشغيل التطبيق...");
        
        await loadMembers();
        await loadFaceDescriptors();
        await loadModels();
        await startCameraForAttendance();
        
        // Button listeners
        captureAttendanceBtn.addEventListener('click', takeAttendance);
        captureRegisterBtn.addEventListener('click', registerFace);
        takeAttendanceBtn.addEventListener('click', () => setMode("attendance"));
        registerFaceBtn.addEventListener('click', () => setMode("register"));
        
        updateDebug(attendanceDebugDiv, "✅ التطبيق جاهز للعمل!");
    }
    
    window.addEventListener('beforeunload', () => {
        if(attendanceStream) attendanceStream.getTracks().forEach(t => t.stop());
        if(registerStream) registerStream.getTracks().forEach(t => t.stop());
    });
    
    init();
</script>
</body>
</html>
