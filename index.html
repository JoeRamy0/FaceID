<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>نظام الحضور - كنيسة القديس يوسف النجار</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #2d3748;
      font-size: 14px;
    }

    select, button {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    select {
      background: white;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .camera-container {
      background: #f7fafc;
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
    }

    #video {
      width: 100%;
      max-width: 400px;
      border-radius: 10px;
      background: #000;
      margin: 10px auto;
      display: block;
    }

    #canvas {
      display: none;
    }

    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
    }

    .status.success {
      background: #c6f6d5;
      color: #22543d;
      border-right: 4px solid #48bb78;
    }

    .status.error {
      background: #fed7d7;
      color: #742a2a;
      border-right: 4px solid #f56565;
    }

    .status.info {
      background: #bee3f8;
      color: #2c5282;
      border-right: 4px solid #4299e1;
    }

    .status.warning {
      background: #feebc8;
      color: #7b341e;
      border-right: 4px solid #ed8936;
    }

    .member-info {
      background: #edf2f7;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      text-align: center;
    }

    .member-info h3 {
      color: #2d3748;
      margin-bottom: 5px;
    }

    .member-info p {
      color: #718096;
      font-size: 12px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #718096;
      margin-top: 5px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .content {
        padding: 20px;
      }
      
      .header h1 {
        font-size: 24px;
      }
      
      #video {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🕊️ نظام الحضور 🕊️</h1>
      <p>كنيسة القديس يوسف النجار - شبرا الخيمة</p>
    </div>
    
    <div class="content">
      <div class="form-group">
        <label>📅 اختر تاريخ الاجتماع:</label>
        <select id="dateSelect">
          <option value="">-- جاري تحميل التواريخ --</option>
        </select>
      </div>
      
      <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <button id="startCameraBtn" onclick="startCamera()">📷 تشغيل الكاميرا</button>
        <div id="status" class="status info">
          ⚡ النظام جاهز | اختر التاريخ أولاً
        </div>
      </div>
      
      <div id="memberInfo" class="member-info" style="display: none;">
        <h3 id="recognizedName"></h3>
        <p id="recognitionStatus"></p>
      </div>
      
      <div class="stats">
        <div class="stat-item">
          <div class="stat-number" id="totalMembers">0</div>
          <div class="stat-label">إجمالي الأعضاء</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="markedCount">0</div>
          <div class="stat-label">تم تسجيلهم اليوم</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script>
    // ==================== CONFIGURATION ====================
    const SCRIPT_URL = 'YOUR_SCRIPT_URL_HERE'; // Replace with your Apps Script URL
    
    // ==================== GLOBAL VARIABLES ====================
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let statusDiv = document.getElementById('status');
    let dateSelect = document.getElementById('dateSelect');
    let startCameraBtn = document.getElementById('startCameraBtn');
    let memberInfoDiv = document.getElementById('memberInfo');
    let recognizedNameSpan = document.getElementById('recognizedName');
    let recognitionStatusSpan = document.getElementById('recognitionStatus');
    let totalMembersSpan = document.getElementById('totalMembers');
    let markedCountSpan = document.getElementById('markedCount');
    
    let currentStream = null;
    let isCameraStarted = false;
    let currentSelectedDate = null;
    let dateMapping = []; // Store date to column mapping
    let members = [];
    let faces = [];
    let isProcessing = false;
    let recognitionInterval = null;
    
    // ==================== HELPER FUNCTIONS ====================
    function showMessage(message, type = 'info') {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
      
      if (type === 'success') {
        setTimeout(() => {
          if (statusDiv.textContent === message) {
            statusDiv.className = 'status info';
            statusDiv.textContent = '⚡ النظام جاهز';
          }
        }, 3000);
      }
    }
    
    // ==================== LOAD MEMBERS ====================
    async function loadMembers() {
      try {
        showMessage('جاري تحميل الأعضاء...', 'info');
        const response = await fetch(`${SCRIPT_URL}?action=getMembers`);
        const result = await response.json();
        
        if (result.success) {
          members = result.members;
          totalMembersSpan.textContent = members.length;
          showMessage(`✓ تم تحميل ${members.length} عضو`, 'success');
          return members;
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('Error loading members:', error);
        showMessage('❌ فشل تحميل الأعضاء: ' + error.message, 'error');
        return [];
      }
    }
    
    // ==================== LOAD DATES ====================
    async function loadDates() {
      try {
        showMessage('جاري تحميل التواريخ...', 'info');
        const response = await fetch(`${SCRIPT_URL}?action=getDatesWithColumns`);
        const result = await response.json();
        
        if (result.success) {
          dateMapping = result.dates;
          
          // Populate dropdown
          dateSelect.innerHTML = '<option value="">-- اختر التاريخ --</option>';
          dateMapping.forEach(item => {
            const option = document.createElement('option');
            option.value = item.date;
            option.textContent = formatDateArabic(item.date);
            option.dataset.column = item.column;
            dateSelect.appendChild(option);
          });
          
          showMessage(`✓ تم تحميل ${dateMapping.length} تاريخ`, 'success');
          return dateMapping;
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('Error loading dates:', error);
        showMessage('❌ فشل تحميل التواريخ: ' + error.message, 'error');
        return [];
      }
    }
    
    // ==================== FORMAT DATE TO ARABIC ====================
    function formatDateArabic(dateStr) {
      const date = new Date(dateStr);
      const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
      const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
      return `${days[date.getDay()]}، ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }
    
    // ==================== LOAD FACE DATA ====================
    async function loadFaceData() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getFaceData`);
        const result = await response.json();
        
        if (result.success) {
          faces = result.faces;
          console.log(`Loaded ${faces.length} face records`);
          return faces;
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('Error loading face data:', error);
        return [];
      }
    }
    
    // ==================== MARK ATTENDANCE ====================
    async function markAttendance(name, date) {
      try {
        const url = `${SCRIPT_URL}?action=markAttendance&name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`;
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.success) {
          if (result.alreadyMarked) {
            showMessage(`⚠️ ${name} تم تسجيل حضوره مسبقاً`, 'warning');
          } else {
            showMessage(`✓ تم تسجيل حضور ${name}`, 'success');
            updateMarkedCount();
          }
          return true;
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('Error marking attendance:', error);
        showMessage(`❌ فشل تسجيل حضور ${name}: ${error.message}`, 'error');
        return false;
      }
    }
    
    // ==================== CHECK ATTENDANCE STATUS ====================
    async function checkAttendanceStatus(name, date) {
      try {
        const url = `${SCRIPT_URL}?action=getAttendanceStatus&name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`;
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.success) {
          return result.isPresent;
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('Error checking attendance:', error);
        return false;
      }
    }
    
    // ==================== UPDATE MARKED COUNT ====================
    async function updateMarkedCount() {
      if (!currentSelectedDate) return;
      
      let count = 0;
      for (const member of members) {
        const isPresent = await checkAttendanceStatus(member.name, currentSelectedDate);
        if (isPresent) count++;
      }
      markedCountSpan.textContent = count;
    }
    
    // ==================== FIND MATCHING FACE ====================
    async function findMatchingFace(descriptor) {
      if (!faces.length || !descriptor) return null;
      
      let bestMatch = null;
      let bestDistance = 0.6; // Threshold for face matching
      
      for (const face of faces) {
        const distance = faceapi.euclideanDistance(descriptor, face.descriptor);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestMatch = face;
        }
      }
      
      return bestMatch;
    }
    
    // ==================== PROCESS FRAME ====================
    async function processFrame() {
      if (!isCameraStarted || isProcessing || !currentSelectedDate) return;
      
      isProcessing = true;
      
      try {
        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
          .withFaceLandmarks()
          .withFaceDescriptors();
        
        if (detections.length > 0) {
          // Take the first detected face
          const detection = detections[0];
          const descriptor = detection.descriptor;
          
          const match = await findMatchingFace(descriptor);
          
          if (match) {
            memberInfoDiv.style.display = 'block';
            recognizedNameSpan.textContent = match.name;
            
            // Check if already marked
            const isPresent = await checkAttendanceStatus(match.name, currentSelectedDate);
            
            if (isPresent) {
              recognitionStatusSpan.textContent = '✓ تم تسجيل حضورك مسبقاً';
              recognitionStatusSpan.style.color = '#48bb78';
            } else {
              recognitionStatusSpan.textContent = 'جاري تسجيل الحضور...';
              recognitionStatusSpan.style.color = '#ed8936';
              
              // Mark attendance
              const marked = await markAttendance(match.name, currentSelectedDate);
              
              if (marked) {
                recognitionStatusSpan.textContent = '✓ تم تسجيل حضورك بنجاح';
                recognitionStatusSpan.style.color = '#48bb78';
                
                // Update count after successful marking
                setTimeout(() => updateMarkedCount(), 1000);
              } else {
                recognitionStatusSpan.textContent = '✗ فشل تسجيل الحضور';
                recognitionStatusSpan.style.color = '#f56565';
              }
            }
          } else {
            memberInfoDiv.style.display = 'block';
            recognizedNameSpan.textContent = 'وجه غير مسجل';
            recognitionStatusSpan.textContent = 'يرجى التواصل مع المسؤول لتسجيل الوجه';
            recognitionStatusSpan.style.color = '#f56565';
          }
        } else {
          memberInfoDiv.style.display = 'none';
        }
      } catch (error) {
        console.error('Error processing frame:', error);
      } finally {
        isProcessing = false;
      }
    }
    
    // ==================== START RECOGNITION INTERVAL ====================
    function startRecognition() {
      if (recognitionInterval) clearInterval(recognitionInterval);
      recognitionInterval = setInterval(processFrame, 1000); // Process every second
    }
    
    // ==================== STOP RECOGNITION ====================
    function stopRecognition() {
      if (recognitionInterval) {
        clearInterval(recognitionInterval);
        recognitionInterval = null;
      }
    }
    
    // ==================== START CAMERA ====================
    async function startCamera() {
      if (isCameraStarted) {
        showMessage('الكاميرا تعمل بالفعل', 'info');
        return;
      }
      
      try {
        showMessage('جاري تشغيل الكاميرا...', 'info');
        
        currentStream = await navigator.mediaDevices.getUserMedia({ 
          video: { 
            width: { ideal: 640 },
            height: { ideal: 480 }
          } 
        });
        
        video.srcObject = currentStream;
        await video.play();
        
        isCameraStarted = true;
        startCameraBtn.textContent = '📷 الكاميرا تعمل';
        startCameraBtn.disabled = true;
        
        // Start face recognition loop
        startRecognition();
        
        showMessage('✓ الكاميرا تعمل | النظام جاهز', 'success');
        
      } catch (error) {
        console.error('Error starting camera:', error);
        showMessage('❌ لا يمكن الوصول للكاميرا: ' + error.message, 'error');
        isCameraStarted = false;
        startCameraBtn.textContent = '📷 تشغيل الكاميرا';
        startCameraBtn.disabled = false;
      }
    }
    
    // ==================== STOP CAMERA ====================
    function stopCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
      video.srcObject = null;
      isCameraStarted = false;
      startCameraBtn.textContent = '📷 تشغيل الكاميرا';
      startCameraBtn.disabled = false;
      stopRecognition();
      showMessage('تم إيقاف الكاميرا', 'info');
    }
    
    // ==================== LOAD FACE API MODELS ====================
    async function loadModels() {
      try {
        showMessage('جاري تحميل نماذج التعرف على الوجوه...', 'info');
        
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        showMessage('✓ تم تحميل نماذج التعرف بنجاح', 'success');
        return true;
      } catch (error) {
        console.error('Error loading models:', error);
        showMessage('❌ فشل تحميل نماذج التعرف: ' + error.message, 'error');
        return false;
      }
    }
    
    // ==================== ON DATE SELECT ====================
    dateSelect.addEventListener('change', async (e) => {
      currentSelectedDate = e.target.value;
      
      if (currentSelectedDate) {
        showMessage(`📅 التاريخ المحدد: ${formatDateArabic(currentSelectedDate)}`, 'success');
        
        // Update marked count for this date
        await updateMarkedCount();
        
        // Show status message
        statusDiv.textContent = `✅ النظام جاهز | التاريخ: ${formatDateArabic(currentSelectedDate)}`;
        statusDiv.className = 'status success';
        
        setTimeout(() => {
          if (statusDiv.textContent.includes('النظام جاهز')) {
            statusDiv.className = 'status info';
            statusDiv.textContent = '⚡ النظام جاهز';
          }
        }, 3000);
      } else {
        showMessage('⚠️ يرجى اختيار التاريخ أولاً', 'warning');
        markedCountSpan.textContent = '0';
      }
    });
    
    // ==================== INITIALIZE ====================
    async function init() {
      showMessage('جاري تهيئة النظام...', 'info');
      
      // Load face-api models
      const modelsLoaded = await loadModels();
      if (!modelsLoaded) return;
      
      // Load data
      await Promise.all([
        loadMembers(),
        loadDates(),
        loadFaceData()
      ]);
      
      showMessage('✓ النظام جاهز | اختر التاريخ ثم انظر للكاميرا', 'success');
    }
    
    // ==================== CLEANUP ON PAGE UNLOAD ====================
    window.addEventListener('beforeunload', () => {
      stopCamera();
    });
    
    // Start initialization
    init();
  </script>
</body>
</html>
